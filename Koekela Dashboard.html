// ─── INDEXEDDB ────────────────────────────────────────
const IDB={
  _db:null,
  open(){
    if(this._db)return Promise.resolve(this._db);
    return new Promise((res,rej)=>{
      const r=indexedDB.open('KoekelDB',1);
      r.onupgradeneeded=e=>e.target.result.createObjectStore('s',{keyPath:'k'});
      r.onsuccess=e=>{this._db=e.target.result;res(this._db);};
      r.onerror=()=>rej(r.error);
    });
  },
  get(key){
    return this.open().then(db=>new Promise(res=>{
      const r=db.transaction('s','readonly').objectStore('s').get(key);
      r.onsuccess=()=>res(r.result?.v);r.onerror=()=>res(null);
    })).catch(()=>null);
  },
  set(key,val){
    return this.open().then(db=>new Promise(res=>{
      const tx=db.transaction('s','readwrite');
      tx.objectStore('s').put({k:key,v:val});
      tx.oncomplete=res;tx.onerror=res;
    })).catch(()=>{});
  }
};

// ─── DATA ─────────────────────────────────────────────
function loadData(){
  try{const r=localStorage.getItem('koekela_data');if(r){const d=JSON.parse(r);if(d?.products&&d?.customers)return d;}}catch(e){}
  try{const r=localStorage.getItem('koekela_data_bak');if(r){const d=JSON.parse(r);if(d?.products&&d?.customers){saveData(d);return d;}}}catch(e){}
  return{products:SEED_PRODUCTS,customers:SEED_CUSTOMERS,transactions:SEED_TX,lang:'en'};
}
function saveData(d){
  const j=JSON.stringify(d);
  try{localStorage.setItem('koekela_data',j);}catch(e){}
  try{localStorage.setItem('koekela_data_bak',j);}catch(e){}
  IDB.set('koekela_data',d);
  try{new BroadcastChannel('koekela_sync').postMessage({type:'update',data:d});}catch(e){}
  saveToCloud(d).catch(()=>{});
}
function markBackup(){localStorage.setItem('koekela_last_backup',Date.now().toString());}

// ─────────────────────────────────────────────────────────────
// CLOUD SYNC — Supabase
// ─────────────────────────────────────────────────────────────
function getSBConfig(){
  return{
    url:localStorage.getItem('koekela_sb_url')||'',
    key:localStorage.getItem('koekela_sb_key')||'',
    shopId:localStorage.getItem('koekela_shop_id')||''
  };
}
function getSBClient(){
  const{url,key}=getSBConfig();
  if(!url||!key||!window.supabase)return null;
  try{return window.supabase.createClient(url,key);}catch(e){return null;}
}
async function saveToCloud(d){
  const sb=getSBClient();const{shopId}=getSBConfig();
  if(!sb||!shopId)return;
  const{error}=await sb.from('shop_data').upsert(
    {shop_id:shopId,data:d,updated_at:new Date().toISOString()},
    {onConflict:'shop_id'}
  );
  if(error)throw error;
}
async function loadFromCloud(){
  const sb=getSBClient();const{shopId}=getSBConfig();
  if(!sb||!shopId)return null;
  try{
    const{data,error}=await sb.from('shop_data').select('data').eq('shop_id',shopId).single();
    if(error||!data)return null;
    return data.data;
  }catch(e){return null;}
}
function subscribeToCloud(cb){
  const sb=getSBClient();const{shopId}=getSBConfig();
  if(!sb||!shopId)return null;
  try{
    return sb.channel('koekela-'+shopId)
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'shop_data',filter:'shop_id=eq.'+shopId},
        payload=>{if(payload.new?.data)cb(payload.new.data);})
      .subscribe();
  }catch(e){return null;}
}

function uid(){
  try{return crypto.randomUUID();}catch(e){}
  return'x'+Math.random().toString(36).slice(2)+Date.now().toString(36);
}
function fmt(n){return'R '+parseFloat(n||0).toFixed(2);}
function fmtDate(iso){return new Date(iso).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'});}

function Btn({children,onClick,variant='primary',size='md',style:s={},disabled=false,type='button'}){
  const V={
    primary:{bg:C.navy,color:'#fff',border:'none'},
    gold:{bg:C.gold,color:C.navyDark,border:'none'},
    success:{bg:C.success,color:'#fff',border:'none'},
    danger:{bg:C.danger,color:'#fff',border:'none'},
    dangerOutline:{bg:'transparent',color:C.danger,border:`1.5px solid ${C.danger}`},
    outline:{bg:'transparent',color:C.navy,border:`1.5px solid ${C.navy}`},
    ghost:{bg:C.bg,color:C.text,border:`1.5px solid ${C.border}`},
    purple:{bg:C.purple,color:'#fff',border:'none'},
  };
  const v=V[variant]||V.primary;
  const pad=size==='sm'?'7px 14px':size==='lg'?'14px 28px':'10px 20px';
  const fs=size==='sm'?12:size==='lg'?16:14;
  return(
    <button type={type} onClick={onClick} disabled={disabled}
      style={{background:v.bg,color:v.color,border:v.border,borderRadius:10,padding:pad,
        fontSize:fs,fontWeight:700,cursor:disabled?'not-allowed':'pointer',opacity:disabled?.5:1,
        display:'inline-flex',alignItems:'center',gap:6,whiteSpace:'nowrap',...s}}>
      {children}
    </button>
  );
}

  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:3000,background:color,color:'#fff',borderRadius:12,padding:'14px 22px',fontSize:14,fontWeight:700,boxShadow:'0 4px 20px rgba(0,0,0,0.2)',animation:'fadeIn .2s ease'}}>
      ✓ {msg}

// ─── BACKUP BANNER ────────────────────────────────────
function BackupBanner({onBackup,lastBackup}){
  const [dismissed,setDismissed]=React.useState(false);
  if(dismissed)return null;
  const needed=!lastBackup||(Date.now()-parseInt(lastBackup)>24*60*60*1000);
  if(!needed)return null;
  const lastStr=lastBackup?new Date(parseInt(lastBackup)).toLocaleDateString('en-ZA'):'Never';
  return(
    <div className="no-print" style={{background:C.purple,padding:'10px 32px',display:'flex',alignItems:'center',gap:12,animation:'fadeIn .3s ease'}}>
      <span style={{fontSize:16}}>⚠️</span>
      <div style={{flex:1,color:'#fff',fontSize:13,fontWeight:600}}>
        Backup recommended — Last backup: <strong>{lastStr}</strong>
      </div>
      <Btn onClick={onBackup} variant='gold' size='sm'>📥 Backup Now</Btn>
      <button onClick={()=>setDismissed(true)} style={{background:'none',border:'none',color:'rgba(255,255,255,0.7)',cursor:'pointer',fontSize:18,lineHeight:1}}>✕</button>
    </div>
  );
}

// ─── OVERVIEW ─────────────────────────────────────────
function Overview({data,setData,setSection,setToast}){
  const todayStr=new Date().toISOString().slice(0,10);
  const todayTxs=data.transactions.filter(tx=>tx.date.slice(0,10)===todayStr);
  const todayTotal=todayTxs.reduce((s,tx)=>s+tx.total,0);
  const totalOwed=data.customers.reduce((s,c)=>s+c.balance,0);
  const openTxs=data.transactions.filter(tx=>tx.status==='open');
  const[settleId,setSettleId]=React.useState(null);

  // Profit & best sellers calculations
  const productMap={};
  data.products.forEach(p=>{productMap[p.id]=p;});
  let todayProfit=0;
  todayTxs.forEach(tx=>{tx.items.forEach(item=>{
    const cost=productMap[item.productId]?.costPrice||0;
    todayProfit+=(item.price-cost)*item.qty;
  });});
  const productSales={};
  data.transactions.forEach(tx=>{tx.items.forEach(item=>{
    if(!productSales[item.productId])productSales[item.productId]={name:item.name,qty:0,revenue:0};
    productSales[item.productId].qty+=item.qty;
    productSales[item.productId].revenue+=item.total;
  });});
  const bestSellers=Object.values(productSales).sort((a,b)=>b.qty-a.qty).slice(0,5);
  const maxQty=bestSellers.length?bestSellers[0].qty:1;
  const todayMargin=todayTotal>0?Math.round((todayProfit/todayTotal)*100):0;

  function settle(id){
    const nd={...data,
      transactions:data.transactions.map(tx=>tx.customerId===id?{...tx,status:'settled'}:tx),
      customers:data.customers.map(c=>c.id===id?{...c,balance:0}:c)
    };
    setData(nd);saveData(nd);setSettleId(null);setToast('Credit settled!');
  }

  const statCards=[
    {label:'Total Outstanding',value:fmt(totalOwed),sub:`${openTxs.length} open transactions`,color:C.navy,icon:'💳'},
    {label:"Today's Sales",value:fmt(todayTotal),sub:`${todayTxs.length} transactions today`,color:C.success,icon:'📈'},
    {label:"Today's Profit",value:fmt(todayProfit),sub:`${todayMargin}% margin today`,color:'#16a34a',icon:'💰'},
    {label:'Customers',value:data.customers.length,sub:`${data.customers.filter(c=>c.balance>0).length} with open credit`,color:C.amber,icon:'👥'},
    {label:'Products in Stock',value:data.products.length,sub:`${data.products.filter(p=>typeof p.stock_qty==='number'&&p.stock_qty===0).length} out · ${data.products.filter(p=>typeof p.stock_qty==='number'&&p.stock_qty>0&&p.stock_qty<=3).length} low`,color:C.navyLight,icon:'📦'},
  ];

  return(
    <div>
      {(()=>{const lp=data.products.filter(p=>typeof p.stock_qty==='number'&&p.stock_qty<=3);return lp.length>0&&(
      <div style={{background:C.dangerLight,border:`1px solid ${C.danger}`,borderRadius:12,padding:'12px 20px',marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:22,flexShrink:0}}>⚠️</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:14,color:C.danger,marginBottom:2}}>Low Stock Alert</div>
          <div style={{fontSize:13,color:C.muted}}>
            {lp.map(p=>(
              <span key={p.id} style={{marginRight:12}}>
                <strong>{p.name}</strong>: {p.stock_qty===0?<span style={{color:C.danger}}>Out of stock</span>:<span style={{color:C.amber}}>{p.stock_qty} left</span>}
              </span>
            ))}
          </div>
        </div>
        <Btn onClick={()=>setSection('stock')} variant='danger' size='sm'>View Stock →</Btn>
      </div>
    );})()}
    {settleId&&<ConfirmDialog title="Settle Credit"
        message={`Mark all transactions as paid for ${data.customers.find(c=>c.id===settleId)?.name}? Amount: ${fmt(data.customers.find(c=>c.id===settleId)?.balance)}`}
        onConfirm={()=>settle(settleId)} onCancel={()=>setSettleId(null)} confirmLabel="Yes, Mark Settled" variant='success'/>}

      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:16,marginBottom:24}}>
        {statCards.map(sc=>(
          <Card key={sc.label}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:6}}>{sc.label}</div>
                <div style={{fontSize:28,fontWeight:900,color:sc.color}}>{sc.value}</div>
                {sc.sub&&<div style={{fontSize:12,color:C.muted,marginTop:4}}>{sc.sub}</div>}
              </div>
              <span style={{fontSize:28,opacity:.5}}>{sc.icon}</span>
            </div>
          </Card>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:20}}>
        <Card style={{padding:0,overflow:'hidden'}}>
          <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h3 style={{fontSize:16,fontWeight:800}}>Customer Credit Summary</h3>
            <Btn onClick={()=>setSection('customers')} variant='ghost' size='sm'>View All →</Btn>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:C.bg}}>
                {['Customer','Phone','Outstanding','Transactions','Action'].map(h=>(
                  <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:11,fontWeight:800,color:C.muted,textTransform:'uppercase',letterSpacing:.4}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {data.customers.map((c,i)=>{
                const open=data.transactions.filter(tx=>tx.customerId===c.id&&tx.status==='open');
                return(
                  <tr key={c.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2?C.bg:'transparent'}}>
                    <td style={{padding:'12px 16px',fontWeight:700,fontSize:14}}>{c.name}</td>
                    <td style={{padding:'12px 16px',color:C.muted,fontSize:13}}>{c.phone}</td>
                    <td style={{padding:'12px 16px'}}>
                      <span style={{fontWeight:900,fontSize:16,color:c.balance>0?C.navy:C.success}}>{fmt(c.balance)}</span>
                    </td>
                    <td style={{padding:'12px 16px'}}>
                      <Badge label={open.length+' open'} color={open.length>0?C.amber:C.success}/>
                    </td>
                    <td style={{padding:'12px 16px'}}>
                      {c.balance>0&&<Btn onClick={()=>setSettleId(c.id)} variant='success' size='sm'>✓ Settle</Btn>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{background:C.goldLight,borderTop:`2px solid ${C.navy}`}}>
                <td colSpan={2} style={{padding:'12px 16px',fontWeight:800,fontSize:14}}>TOTAL OUTSTANDING</td>
                <td style={{padding:'12px 16px',fontWeight:900,fontSize:18,color:C.navy}}>{fmt(totalOwed)}</td>
                <td colSpan={2}/>
              </tr>
            </tfoot>
          </table>
        </Card>

              <h3 style={{fontSize:16,fontWeight:800}}>Recent Transactions</h3>

            <div style={{maxHeight:260,overflow:'auto'}}>
              {openTxs.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10).map(tx=>(
                <div key={tx.id} style={{padding:'12px 20px',borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>

            <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`}}>
              <h3 style={{fontSize:16,fontWeight:800}}>🔥 Best Sellers (All Time)</h3>
            </div>
            <div style={{padding:'16px 20px'}}>
              {bestSellers.length===0&&<div style={{color:C.muted,textAlign:'center',padding:'16px 0',fontSize:14}}>No sales data yet</div>}
              {bestSellers.map((p,i)=>(
                <div key={p.name} style={{marginBottom:i<bestSellers.length-1?14:0}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:15}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`}</span>
                      <span style={{fontSize:14,fontWeight:700,color:C.text}}>{p.name}</span>
                    </div>
                    <span style={{fontSize:13,fontWeight:700,color:C.muted}}>{p.qty} sold</span>
                  </div>

}

// ─── CUSTOMERS SECTION ────────────────────────────────
function CustomersSection({data,setData,setToast}){
  const [search,setSearch]=React.useState('');
  const [modal,setModal]=React.useState(null);
  const [viewCustomer,setViewCustomer]=React.useState(null);
  const [form,setForm]=React.useState({name:'',phone:''});
  const [settleConfirm,setSettleConfirm]=React.useState(null);
  const [delConfirm,setDelConfirm]=React.useState(null);
  const [delTxConfirm,setDelTxConfirm]=React.useState(null);
  const [addTxModal,setAddTxModal]=React.useState(false);
  const [txForm,setTxForm]=React.useState({note:'',amount:'',date:new Date().toISOString().split('T')[0]});

  const filtered=data.customers.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.phone.includes(search));

  function saveCustomer(){
    if(!form.name.trim())return;
    let nd;
    if(modal==='add'){
      nd={...data,customers:[...data.customers,{id:uid(),name:form.name.trim(),phone:form.phone.trim(),balance:0}]};
    } else {
      nd={...data,customers:data.customers.map(c=>c.id===modal.id?{...c,name:form.name.trim(),phone:form.phone.trim()}:c)};
    }
    setData(nd);saveData(nd);setModal(null);setToast(modal==='add'?'Customer added!':'Customer updated!');
  }

  function deleteCustomer(id){
    const nd={...data,customers:data.customers.filter(c=>c.id!==id),transactions:data.transactions.filter(tx=>tx.customerId!==id)};
    setData(nd);saveData(nd);setDelConfirm(null);setViewCustomer(null);setToast('Customer deleted');
  }

  function settle(id){
    const nd={...data,
      transactions:data.transactions.map(tx=>tx.customerId===id?{...tx,status:'settled'}:tx),
      customers:data.customers.map(c=>c.id===id?{...c,balance:0}:c)
    };
    setData(nd);saveData(nd);setSettleConfirm(null);setToast('Credit settled!');
  }

  function deleteTx(txId,amount,custId){
    const nd={...data,
      transactions:data.transactions.filter(tx=>tx.id!==txId),
      customers:data.customers.map(c=>c.id===custId?{...c,balance:Math.max(0,parseFloat((c.balance-amount).toFixed(2)))}:c)
    };
    setData(nd);saveData(nd);setDelTxConfirm(null);setToast('Transaction deleted');
  }

  function addManualTx(){
    if(!txForm.note.trim())return;
    const amount=parseFloat(txForm.amount);
    if(isNaN(amount)||amount<=0){alert('Please enter a valid amount greater than R 0');return;}
    const tx={id:uid(),customerId:viewCustomer.id,customerName:viewCustomer.name,
      date:new Date(txForm.date).toISOString(),
      items:[{productId:'manual',name:txForm.note.trim(),qty:1,price:amount,total:amount}],
      total:amount,status:'open'};
    const nd={...data,
      transactions:[...data.transactions,tx],
      customers:data.customers.map(c=>c.id===viewCustomer.id?{...c,balance:parseFloat((c.balance+amount).toFixed(2))}:c)
    };
    setData(nd);saveData(nd);setAddTxModal(false);setTxForm({note:'',amount:'',date:new Date().toISOString().split('T')[0]});
    setToast('Transaction added!');
  }

  // CUSTOMER DETAIL VIEW
  if(viewCustomer){
    const cust=data.customers.find(c=>c.id===viewCustomer.id)||viewCustomer;
    const txs=data.transactions.filter(tx=>tx.customerId===cust.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const openBal=txs.filter(tx=>tx.status==='open').reduce((s,tx)=>s+tx.total,0);
    const curMon=new Date();
    const thisMonthTotal=txs.filter(tx=>{const d=new Date(tx.date);return d.getMonth()===curMon.getMonth()&&d.getFullYear()===curMon.getFullYear();}).reduce((s,tx)=>s+tx.total,0);
    return(
      <div>
        {settleConfirm&&<ConfirmDialog title="Settle Credit" message={`Mark all as paid for ${cust.name}? Deduct ${fmt(openBal)} from pay.`} onConfirm={()=>settle(cust.id)} onCancel={()=>setSettleConfirm(null)} confirmLabel="Yes, Mark Settled" variant='success'/>}
        {delConfirm&&<ConfirmDialog title="Delete Customer" message={`Delete ${cust.name} and ALL their transactions? This cannot be undone.`} onConfirm={()=>deleteCustomer(cust.id)} onCancel={()=>setDelConfirm(null)} confirmLabel="Delete Customer"/>}
        {delTxConfirm&&<ConfirmDialog title="Delete Transaction" message={`Delete transaction from ${fmtDate(delTxConfirm.date)} (${fmt(delTxConfirm.total)})?`} onConfirm={()=>deleteTx(delTxConfirm.id,delTxConfirm.total,cust.id)} onCancel={()=>setDelTxConfirm(null)} confirmLabel="Delete"/>}

        {addTxModal&&(
          <Modal title="Add Manual Transaction" onClose={()=>setAddTxModal(false)}>
            <FormField label="Description / Note">
              <TextInput value={txForm.note} onChange={e=>setTxForm(f=>({...f,note:e.target.value}))} placeholder="e.g. Bread + Milk"/>
            </FormField>
            <FormField label="Amount (R)" note="Must be greater than R 0">
              <TextInput value={txForm.amount} onChange={e=>setTxForm(f=>({...f,amount:e.target.value}))} type="number" placeholder="0.00"/>
            </FormField>
            <FormField label="Date">
              <TextInput value={txForm.date} onChange={e=>setTxForm(f=>({...f,date:e.target.value}))} type="date"/>
            </FormField>
            <div style={{display:'flex',gap:10,marginTop:4}}>
              <Btn onClick={()=>setAddTxModal(false)} variant='ghost' style={{flex:1}}>Cancel</Btn>
              <Btn onClick={addManualTx} variant='primary' style={{flex:1}}>Add Transaction</Btn>
            </div>
          </Modal>
        )}

        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
          <Btn onClick={()=>setViewCustomer(null)} variant='ghost' size='sm'>‹ All Customers</Btn>
          <div style={{flex:1}}/>
          <Btn onClick={()=>{setForm({name:cust.name,phone:cust.phone});setModal(cust);}} variant='outline' size='sm'>✏️ Edit</Btn>
          <Btn onClick={()=>setAddTxModal(true)} variant='gold' size='sm'>+ Add Transaction</Btn>
          {openBal>0&&<Btn onClick={()=>setSettleConfirm(true)} variant='success' size='sm'>✓ Settle All</Btn>}
          <Btn onClick={()=>setDelConfirm(true)} variant='dangerOutline' size='sm'>🗑️ Delete</Btn>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16,marginBottom:20}}>
          <Card style={{background:`linear-gradient(135deg,${C.navyDark},${C.navy})`,padding:'20px 24px'}}>
            <div style={{color:'rgba(255,255,255,0.6)',fontSize:12,fontWeight:600,marginBottom:4}}>Customer</div>
            <div style={{color:'#fff',fontSize:20,fontWeight:900}}>{cust.name}</div>
            <div style={{color:'rgba(255,255,255,0.5)',fontSize:13,marginTop:4}}>{cust.phone}</div>
          </Card>
          <Card>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:'uppercase',marginBottom:4}}>Outstanding Balance</div>
            <div style={{fontSize:30,fontWeight:900,color:openBal>0?C.navy:C.success}}>{fmt(openBal)}</div>
            {openBal>0&&<div style={{fontSize:12,color:C.muted,marginTop:4}}>Deduct from end-of-month pay</div>}
          </Card>
          <Card>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:'uppercase',marginBottom:4}}>This Month</div>
            <div style={{fontSize:30,fontWeight:900,color:C.amber}}>{fmt(thisMonthTotal)}</div>
            <div style={{fontSize:12,color:C.muted,marginTop:4}}>{txs.length} total transactions</div>
          </Card>
        </div>

        <Card style={{padding:0,overflow:'hidden'}}>
          <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`}}>
            <h3 style={{fontSize:16,fontWeight:800}}>Credit Log — {cust.name}</h3>
          </div>
          {txs.length===0&&<div style={{padding:'40px',textAlign:'center',color:C.muted}}>No transactions yet</div>}
          {txs.map(tx=>(
            <div key={tx.id} style={{borderBottom:`1px solid ${C.border}`,padding:'14px 20px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                    <span style={{fontSize:14,fontWeight:700,color:C.text}}>{fmtDate(tx.date)}</span>
                    <Badge label={tx.status==='open'?'Outstanding':'Settled'} color={tx.status==='open'?C.amber:C.success}/>
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'4px 16px'}}>
                    {tx.items.map((it,i)=>(
                      <span key={i} style={{fontSize:12,color:C.muted}}>{it.name} ×{it.qty} = {fmt(it.total)}</span>
                    ))}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:12,marginLeft:20}}>
                  <span style={{fontSize:18,fontWeight:900,color:C.navy}}>{fmt(tx.total)}</span>
                  <Btn onClick={()=>setDelTxConfirm(tx)} variant='dangerOutline' size='sm'>🗑️ Delete</Btn>
                </div>
              </div>
            </div>
          ))}
          {txs.length>0&&(
            <div style={{padding:'14px 20px',background:C.goldLight,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:800,fontSize:15}}>Total all time</span>
              <span style={{fontWeight:900,fontSize:20,color:C.navy}}>{fmt(txs.reduce((s,tx)=>s+tx.total,0))}</span>
            </div>
          )}
        </Card>

        {modal&&(
          <Modal title="Edit Customer" onClose={()=>setModal(null)}>
            <FormField label="Customer Name"><TextInput value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></FormField>
            <FormField label="Phone Number"><TextInput value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} type="tel"/></FormField>
            <Btn onClick={saveCustomer} variant='primary' style={{width:'100%'}}>Save Changes</Btn>
          </Modal>
        )}
      </div>
    );
  }

  // CUSTOMERS LIST
  return(
    <div>
      {modal&&(
        <Modal title={modal==='add'?'Add New Customer':'Edit Customer'} onClose={()=>setModal(null)}>
          <FormField label="Full Name"><TextInput value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. John Sithole"/></FormField>
          <FormField label="Phone Number"><TextInput value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="e.g. 082 123 4567" type="tel"/></FormField>
          <div style={{display:'flex',gap:10}}>
            <Btn onClick={()=>setModal(null)} variant='ghost' style={{flex:1}}>Cancel</Btn>
            <Btn onClick={saveCustomer} variant='primary' style={{flex:1}}>Save</Btn>
          </div>
        </Modal>
      )}
      {settleConfirm&&<ConfirmDialog title="Settle Credit" message={`Mark all as paid for ${data.customers.find(c=>c.id===settleConfirm)?.name}?`} onConfirm={()=>settle(settleConfirm)} onCancel={()=>setSettleConfirm(null)} confirmLabel="Yes, Settle" variant='success'/>}

      <SectionHeader title="Customers" action={
        <div style={{display:'flex',gap:10}}>
          <TextInput value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search..." style={{width:220}}/>
          <Btn onClick={()=>{setForm({name:'',phone:''});setModal('add');}} variant='primary'>+ Add Customer</Btn>
        </div>
      }/>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
        {filtered.map(c=>{
          const txs=data.transactions.filter(tx=>tx.customerId===c.id);
          const open=txs.filter(tx=>tx.status==='open');
          return(
            <Card key={c.id} style={{padding:0,overflow:'hidden'}}>
              <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontWeight:800,fontSize:16}}>{c.name}</div>
                  <div style={{color:C.muted,fontSize:13,marginTop:2}}>{c.phone||'No phone'}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:900,fontSize:22,color:c.balance>0?C.navy:C.success}}>{fmt(c.balance)}</div>
                  <Badge label={c.balance>0?'Outstanding':'Clear'} color={c.balance>0?C.amber:C.success}/>
                </div>
              </div>
              <div style={{padding:'12px 20px',display:'flex',gap:'6px',flexWrap:'wrap'}}>
                <Btn onClick={()=>setViewCustomer(c)} variant='outline' size='sm'>📋 View Log</Btn>
                <Btn onClick={()=>{setForm({name:c.name,phone:c.phone});setModal(c);}} variant='ghost' size='sm'>✏️ Edit</Btn>
                {c.balance>0&&<Btn onClick={()=>setSettleConfirm(c.id)} variant='success' size='sm'>✓ Settle</Btn>}
              </div>
              <div style={{padding:'0 20px 14px',fontSize:12,color:C.muted}}>
                {open.length} open · {txs.length} total transactions
              </div>
            </Card>
          );
        })}
        {filtered.length===0&&<div style={{color:C.muted,fontSize:14,padding:'30px 0'}}>No customers found</div>}
      </div>
    </div>
  );
}

// ─── STOCK RECEIVE MODAL (Dashboard) ─────────────────────
function StockReceiveModalDash({data,setData,onClose,setToast}){
  const [rows,setRows]=React.useState([{productId:'',qty:''}]);

  function setRow(i,field,val){setRows(r=>r.map((row,idx)=>idx===i?{...row,[field]:val}:row));}
  function addRow(){setRows(r=>[...r,{productId:'',qty:''}]);}
  function removeRow(i){setRows(r=>r.filter((_,idx)=>idx!==i));}

  function confirm(){
    const valid=rows.filter(r=>r.productId&&parseInt(r.qty)>0);
    if(valid.length===0){alert('Add at least one product with a quantity greater than 0.');return;}
    const updatedProducts=data.products.map(p=>{
      const items=valid.filter(r=>r.productId===p.id);
      if(items.length===0)return p;
      const totalQty=items.reduce((s,r)=>s+parseInt(r.qty),0);
      return{...p,stock_qty:(typeof p.stock_qty==='number'?p.stock_qty:0)+totalQty};
    });
    const nd={...data,products:updatedProducts};
    setData(nd);saveData(nd);
    onClose();
    setToast(`Stock updated for ${valid.length} product(s)!`);
  }

  return(
    <Modal title="📥 Receive Stock" onClose={onClose} width={560}>
      <div style={{marginBottom:14,background:'#EFF6FF',borderRadius:10,padding:'12px 16px',fontSize:13,color:'#1E40AF',lineHeight:1.6}}>
        💡 Enter each product you received in this delivery. Quantities will be <strong>added</strong> to current stock levels.
      </div>
      <table style={{width:'100%',borderCollapse:'collapse',marginBottom:12}}>
        <thead>
          <tr style={{background:C.bg}}>
            {['Product','Qty Received',''].map(h=>(
              <th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:11,fontWeight:800,color:C.muted,textTransform:'uppercase'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((row,i)=>(
            <tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
              <td style={{padding:'8px 12px'}}>
                <select value={row.productId} onChange={e=>setRow(i,'productId',e.target.value)}
                  style={{width:'100%',background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:8,padding:'8px 10px',fontSize:13,outline:'none'}}>
                  <option value="">Select product...</option>
                  {data.products.map(p=><option key={p.id} value={p.id}>{p.name} (stock: {typeof p.stock_qty==='number'?p.stock_qty:'—'})</option>)}
                </select>
              </td>
              <td style={{padding:'8px 12px',width:120}}>
                <input value={row.qty} onChange={e=>setRow(i,'qty',e.target.value)} type="number" min="1" placeholder="0"
                  style={{width:'100%',background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:8,padding:'8px 10px',fontSize:14,fontWeight:700,outline:'none',textAlign:'center'}}/>
              </td>
              <td style={{padding:'8px 12px',width:40}}>
                {rows.length>1&&<button onClick={()=>removeRow(i)} style={{background:C.dangerLight,border:`1px solid ${C.danger}`,color:C.danger,borderRadius:6,padding:'5px 8px',cursor:'pointer',fontSize:12,fontWeight:700}}>✕</button>}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{display:'flex',gap:10}}>
        <Btn onClick={addRow} variant='ghost' size='sm'>+ Add Row</Btn>
        <div style={{flex:1}}/>
        <Btn onClick={onClose} variant='ghost'>Cancel</Btn>
        <Btn onClick={confirm} variant='success'>✓ Update Stock</Btn>
      </div>
    </Modal>
  );
}

// ─── STOCK SECTION ────────────────────────────────────
function StockSection({data,setData,setToast}){
  const [search,setSearch]=React.useState('');
  const [modal,setModal]=React.useState(null);
  const [form,setForm]=React.useState({barcode:'',name:'',nameAf:'',costPrice:'',sellPrice:'',markup:'20',category:'food',stock_qty:''});
  const [err,setErr]=React.useState('');
  const [delConfirm,setDelConfirm]=React.useState(null);
  const [receiveModal,setReceiveModal]=React.useState(false);

  const products=data.products.filter(p=>
    p.name.toLowerCase().includes(search.toLowerCase())||
    (p.nameAf||'').toLowerCase().includes(search.toLowerCase())||
    p.barcode.includes(search)
  );

  function openAdd(){setForm({barcode:'',name:'',nameAf:'',costPrice:'',sellPrice:'',markup:'20',category:'food',stock_qty:''});setErr('');setModal('add');}
  function openEdit(p){setForm({barcode:p.barcode,name:p.name,nameAf:p.nameAf||'',costPrice:String(p.costPrice),sellPrice:String(p.sellPrice),markup:String(p.markup),category:p.category||'food',stock_qty:typeof p.stock_qty==='number'?String(p.stock_qty):''});setErr('');setModal(p);}

  function calcSell(){
    const c=parseFloat(form.costPrice),m=parseFloat(form.markup);
    if(isNaN(c)||isNaN(m)){setErr('Enter valid cost price and markup first');return;}
    setForm(f=>({...f,sellPrice:(c*(1+m/100)).toFixed(2)}));
  }

  function save(){
    if(!form.name.trim()){setErr('Please enter a product name');return;}
    if(!form.barcode.trim()){setErr('Please enter a barcode');return;}
    const cp=parseFloat(form.costPrice);const sp=parseFloat(form.sellPrice);
    if(isNaN(cp)||cp<0){setErr('Enter a valid cost price');return;}
    if(isNaN(sp)||sp<0){setErr('Enter a valid sell price');return;}
    if(modal==='add'&&data.products.find(p=>p.barcode===form.barcode.trim())){setErr('A product with this barcode already exists');return;}
    const sqv=form.stock_qty.trim();
    const prod={
      id:modal==='add'?uid():modal.id,
      barcode:form.barcode.trim(),name:form.name.trim(),nameAf:form.nameAf.trim(),
      costPrice:cp,sellPrice:sp,markup:parseFloat(form.markup)||0,category:form.category,
      stock_qty:sqv===''?null:Math.max(0,parseInt(sqv)||0)
    };
    const nd={...data,products:modal==='add'?[...data.products,prod]:data.products.map(p=>p.id===prod.id?prod:p)};
    setData(nd);saveData(nd);setModal(null);setToast(modal==='add'?'Product added!':'Product updated!');
  }

  function deleteProduct(id){
    const nd={...data,products:data.products.filter(p=>p.id!==id)};
    setData(nd);saveData(nd);setDelConfirm(null);setModal(null);setToast('Product deleted');
  }

  return(
    <div>
      {delConfirm&&<ConfirmDialog title="Delete Product" message={`Delete "${delConfirm.name}"? This cannot be undone.`} onConfirm={()=>deleteProduct(delConfirm.id)} onCancel={()=>setDelConfirm(null)} confirmLabel="Delete Product"/>}
      {receiveModal&&<StockReceiveModalDash data={data} setData={setData} onClose={()=>setReceiveModal(false)} setToast={setToast}/>}

      {modal&&(
        <Modal title={modal==='add'?'Add New Product':`Edit: ${modal.name||''}`} onClose={()=>setModal(null)}>
          <FormField label="Barcode Number" note="Scan with phone or enter manually">
            <TextInput value={form.barcode} onChange={e=>setForm(f=>({...f,barcode:e.target.value}))} placeholder="e.g. 6001234567890"/>
          </FormField>
          <FormField label="Product Name (English)">
            <TextInput value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. White Bread"/>
          </FormField>
          <FormField label="Product Name (Afrikaans)" note="Optional">
            <TextInput value={form.nameAf} onChange={e=>setForm(f=>({...f,nameAf:e.target.value}))} placeholder="e.g. Witbrood"/>
          </FormField>
          <FormField label="Category">

function ReportsSection({data}){
  const curYear=new Date().getFullYear();
  const [monthIdx,setMonthIdx]=React.useState(new Date().getMonth());
  const [year,setYear]=React.useState(curYear);
  const [showAll,setShowAll]=React.useState(false);
  const years=[curYear-1,curYear,curYear+1];

  const filtered=data.transactions.filter(tx=>{
    if(showAll)return true;
    const d=new Date(tx.date);return d.getMonth()===monthIdx&&d.getFullYear()===year;
  });
  const byCust=data.customers.map(c=>{
    const txs=filtered.filter(tx=>tx.customerId===c.id);
    const total=txs.reduce((s,tx)=>s+tx.total,0);
    return{...c,txs,total,items:txs.reduce((s,tx)=>s+tx.items.reduce((ss,i)=>ss+i.qty,0),0)};
  }).filter(c=>c.txs.length>0).sort((a,b)=>b.total-a.total);
  const grand=byCust.reduce((s,c)=>s+c.total,0);
  const label=showAll?'All Time':MONTHS[monthIdx]+' '+year;

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:900}}>Monthly Report</h2>

            style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:9,padding:'9px 12px',fontSize:13,outline:'none'}}>
            <option value="all">All Time</option>
            {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
          </select>
          <select value={year} onChange={e=>setYear(Number(e.target.value))}
            style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:9,padding:'9px 12px',fontSize:13,outline:'none'}}>
            {years.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          <Btn onClick={()=>window.print()} variant='primary' size='sm' className="no-print">🖨️ Print Report</Btn>
        </div>
      </div>

      <div style={{background:`linear-gradient(135deg,${C.navyDark},${C.navy})`,borderRadius:16,padding:'24px 32px',marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{color:'rgba(255,255,255,0.6)',fontSize:13,fontWeight:600,marginBottom:4}}>{label}</div>
          <div style={{color:'#fff',fontSize:42,fontWeight:900}}>{fmt(grand)}</div>
          <div style={{color:C.gold,fontSize:14,fontWeight:700,marginTop:4}}>Grand Total Credit</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{color:'rgba(255,255,255,0.7)',fontSize:14,marginBottom:4}}>{filtered.length} transactions</div>
          <div style={{color:'rgba(255,255,255,0.7)',fontSize:14,marginBottom:4}}>{byCust.length} customers</div>
          <div style={{color:'rgba(255,255,255,0.7)',fontSize:14}}>{byCust.reduce((s,c)=>s+c.items,0)} items total</div>
        </div>
      </div>

      {byCust.length===0&&<div style={{textAlign:'center',color:C.muted,padding:'40px 0',fontSize:16}}>No transactions for this period</div>}
      {byCust.map(c=>(
        <div key={c.id} className="print-page">
          <Card style={{marginBottom:16,padding:0,overflow:'hidden'}}>
            <div style={{background:C.bg,padding:'14px 20px',borderBottom:`2px solid ${C.navy}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:900,fontSize:18}}>{c.name}</div>

              <thead>

// CLOUD SYNC SETTINGS SECTION
// ─────────────────────────────────────────────────────────────
function CloudSyncSection({data}){
  const cfg=getSBConfig();
  const[url,setUrl]=React.useState(cfg.url);
  const[key,setKey]=React.useState(cfg.key);
  const[shopId,setShopId]=React.useState(cfg.shopId);
  const[status,setStatus]=React.useState('idle');
  const[show,setShow]=React.useState(!cfg.url);
  const isConfigured=!!(cfg.url&&cfg.key&&cfg.shopId);

  async function saveAndTest(){
    setStatus('saving');
    localStorage.setItem('koekela_sb_url',url.trim());
    localStorage.setItem('koekela_sb_key',key.trim());
    localStorage.setItem('koekela_shop_id',shopId.trim());
    try{await saveToCloud(data);setStatus('ok');setTimeout(()=>setShow(false),1500);}
    catch(e){setStatus('fail');}
  }
  function disconnect(){
    ['koekela_sb_url','koekela_sb_key','koekela_shop_id'].forEach(k=>localStorage.removeItem(k));
    setUrl('');setKey('');setShopId('');setStatus('idle');setShow(true);
  }

  return(
    <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>☁️ Cloud Sync</div>
        <span style={{fontSize:12,fontWeight:700,color:isConfigured?'#22c55e':'#999'}}>{isConfigured?'● Connected':'○ Off'}</span>
      </div>
      {isConfigured&&!show&&(
        <div style={{background:C.bg,borderRadius:10,padding:'10px 14px',marginBottom:8,fontSize:12,color:C.muted}}>
          Shop: <strong style={{color:C.text}}>{cfg.shopId}</strong> · Syncing automatically
        </div>
      )}
      <Btn onClick={()=>setShow(s=>!s)} variant='outline' style={{width:'100%',marginBottom:show?10:0}}>
        {show?'▲ Hide':(isConfigured?'✏️ Edit Sync Settings':'⚙️ Set Up Cloud Sync')}
      </Btn>
      {show&&(
        <div>
          <div style={{fontSize:11,lineHeight:1.6,background:'#EFF6FF',borderRadius:8,padding:'10px',border:'1px solid #BFDBFE',marginBottom:10,color:'#1D4ED8'}}>
            💡 Go to <strong>supabase.com</strong> → your project → <strong>Settings → API</strong><br/>Copy <em>Project URL</em> and <em>anon public</em> key. Choose any Shop ID — all devices must use the same one.
          </div>
          {[
            {label:'Project URL',val:url,set:setUrl,ph:'https://xxxx.supabase.co'},
            {label:'Anon Key',val:key,set:setKey,ph:'eyJhbGciOi...'},
            {label:'Shop ID',val:shopId,set:setShopId,ph:'my-spaza-2024'},
          ].map(({label,val,set,ph})=>(
            <div key={label} style={{marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:3}}>{label}</div>
              <input value={val} onChange={e=>set(e.target.value)} placeholder={ph}
                style={{width:'100%',border:`1.5px solid ${C.border}`,borderRadius:8,padding:'9px 12px',fontSize:12,outline:'none',background:C.white,color:C.text}}/>
            </div>
          ))}
          <Btn onClick={saveAndTest} variant='primary' style={{width:'100%',marginTop:4}}>
            {status==='saving'?'Connecting...'
             :status==='ok'?'✅ Connected!'
             :status==='fail'?'❌ Failed — check details'
             :'💾 Save & Connect'}
          </Btn>
          {isConfigured&&(
            <Btn onClick={disconnect} variant='dangerOutline' style={{width:'100%',marginTop:8}}>
              Disconnect Cloud Sync
            </Btn>
          )}
        </div>
      )}
    </div>
  );
}

// ─── SETTINGS SECTION ─────────────────────────────────
function SettingsSection({data,setData,setToast,lastBackup,onBackup}){
  const lastStr=lastBackup?new Date(parseInt(lastBackup)).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'}):'Never';

  function exportData(){
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`koekela-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();URL.revokeObjectURL(url);
    markBackup();
    onBackup();
    setToast('Backup downloaded!');
  }

  function importData(e){
    const file=e.target.files[0];if(!file)return;
    if(file.size>10*1024*1024){setToast('File too large');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d?.products||!d?.customers||!d?.transactions)throw new Error('Invalid structure');
        setData(d);saveData(d);setToast('Data restored!');
      }catch(err){alert('❌ Invalid backup file — could not restore');}
    };
    reader.onerror=()=>alert('❌ Could not read file');
    reader.readAsText(file);
  }

  const totalOwed=data.customers.reduce((s,c)=>s+c.balance,0);

  return(
    <div style={{maxWidth:700}}>
      <SectionHeader title="Settings & Data"/>

      {/* Backup status */}
      <Card style={{background:lastBackup?C.successLight:C.dangerLight,border:`1px solid ${lastBackup?C.success:C.danger}`,marginBottom:20,padding:'16px 20px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:800,fontSize:15,marginBottom:2}}>{lastBackup?'✅ Data Backed Up':'⚠️ No Backup Yet'}</div>
            <div style={{fontSize:13,color:C.muted}}>Last backup: <strong>{lastStr}</strong></div>
          </div>
          <Btn onClick={exportData} variant='primary'>📥 Backup Now</Btn>
        </div>
      </Card>

      <Card style={{marginBottom:16}}>
        <h3 style={{fontWeight:800,fontSize:16,marginBottom:16}}>Backup & Restore</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div style={{background:C.bg,borderRadius:12,padding:20}}>
            <div style={{fontSize:24,marginBottom:8}}>📥</div>
            <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>Download Backup</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:12,lineHeight:1.5}}>Save all your data as a JSON file. Do this at the end of every month.</div>
            <Btn onClick={exportData} variant='primary' style={{width:'100%'}}>Download Backup File</Btn>
          </div>
          <div style={{background:C.bg,borderRadius:12,padding:20}}>
            <div style={{fontSize:24,marginBottom:8}}>📤</div>
            <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>Restore from Backup</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:12,lineHeight:1.5}}>Load data from a previously downloaded backup file.</div>
            <label>
              <div style={{background:C.navy,color:'#fff',borderRadius:10,padding:'10px 16px',fontSize:14,fontWeight:700,cursor:'pointer',textAlign:'center'}}>
                Select Backup File
              </div>
              <input type="file" accept=".json" onChange={importData} style={{display:'none'}}/>
            </label>
          </div>
        </div>
      </Card>

      <Card style={{marginBottom:16}}>
        <CloudSyncSection data={data}/>
        <h3 style={{fontWeight:800,fontSize:16,marginBottom:16}}>Data Summary</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
          {[
            {l:'Products',v:data.products.length,color:C.navyLight},
            {l:'Customers',v:data.customers.length,color:C.success},
            {l:'Transactions',v:data.transactions.length,color:C.amber},
            {l:'Outstanding',v:fmt(totalOwed),color:C.navy},
          ].map(({l,v,color})=>(
            <div key={l} style={{background:C.bg,borderRadius:12,padding:'16px'}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',marginBottom:6}}>{l}</div>
              <div style={{fontSize:22,fontWeight:900,color}}>{v}</div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <h3 style={{fontWeight:800,fontSize:16,marginBottom:12}}>🚀 How to deploy to phone (Free)</h3>
        <ol style={{fontSize:13,color:C.text,lineHeight:2.2,paddingLeft:20}}>
          <li>Create a free account at <strong>github.com</strong> and <strong>vercel.com</strong></li>
          <li>Create a new GitHub repository and upload your 5 files (both HTML files, manifest.json, sw.js, icon.svg)</li>
          <li>On Vercel: "New Project" → Import from GitHub → Deploy</li>
          <li>You get a free HTTPS URL like <code style={{background:C.bg,padding:'2px 6px',borderRadius:4}}>koekela.vercel.app</code></li>
          <li>Open that URL on your phone → tap Share → "Add to Home Screen"</li>
        </ol>
        <div style={{background:'#EFF6FF',border:'1px solid #3B82F6',borderRadius:10,padding:'12px 16px',marginTop:12,fontSize:13,color:C.text}}>
          ℹ️ Once hosted on HTTPS, the app installs on your phone like a native app and <strong>works offline</strong>. Data syncs between phone and computer only when both are open in the same browser on the same device. For real multi-device sync, add <strong>Firebase</strong> (free tier available).
        </div>
      </Card>
    </div>
  );
}

// ─── MAIN DASHBOARD ───────────────────────────────────
function Dashboard(){
  const [data,setData]=React.useState(()=>loadData());
  const [section,setSection]=React.useState('overview');
  const [liveFlash,setLiveFlash]=React.useState(false);
  const [toast,setToast]=React.useState('');
  const [lastBackup,setLastBackup]=React.useState(()=>localStorage.getItem('koekela_last_backup'));

  // IDB fallback on first load
  React.useEffect(()=>{
    if(!localStorage.getItem('koekela_data')){
      IDB.get('koekela_data').then(d=>{if(d&&d.products&&d.customers){setData(d);saveData(d);}});
    }
  },[]);

  // Live sync from phone app (BroadcastChannel only — no polling to avoid races)
  React.useEffect(()=>{
    let ch;
    try{
      ch=new BroadcastChannel('koekela_sync');
      ch.onmessage=e=>{
        if(e.data?.type==='update'&&e.data?.data){
          setData(e.data.data);setLiveFlash(true);setTimeout(()=>setLiveFlash(false),2000);
        }
      };
    }catch(e){}
    return()=>{try{if(ch)ch.close();}catch(e){}};
  },[]);

  // Cloud sync — load on mount, subscribe to real-time changes
  React.useEffect(()=>{
    const{shopId}=getSBConfig();
    if(!shopId)return;
    function applyCloud(d){
      if(!d?.products||!d?.customers)return;
      setData(d);
      const j=JSON.stringify(d);
      try{localStorage.setItem('koekela_data',j);}catch(e){}
      try{localStorage.setItem('koekela_data_bak',j);}catch(e){}
      IDB.set('koekela_data',d);
    }
    function syncNow(){loadFromCloud().then(applyCloud);}
    syncNow(); // pull on mount
    // Pull again every time the user switches back to this tab
    function onVisible(){if(document.visibilityState==='visible')syncNow();}
    document.addEventListener('visibilitychange',onVisible);
    const ch=subscribeToCloud(d=>{
      applyCloud(d);
      setLiveFlash(true);setTimeout(()=>setLiveFlash(false),2000);
    });
    return()=>{
      document.removeEventListener('visibilitychange',onVisible);
      try{if(ch)ch.unsubscribe();}catch(e){}
    };
  },[]);

  function handleBackup(){
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`koekela-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();URL.revokeObjectURL(url);
    markBackup();
    setLastBackup(Date.now().toString());
    setToast('Backup downloaded!');
  }

  const navItems=[
    {id:'overview',label:'Overview',icon:'📊'},
    {id:'customers',label:'Customers',icon:'👥'},
    {id:'stock',label:'Stock',icon:'📦'},
    {id:'reports',label:'Reports',icon:'📋'},
    {id:'settings',label:'Settings',icon:'⚙️'},
  ];

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}

      {/* Sidebar */}
      <div className="no-print" style={{width:220,background:C.navyDark,display:'flex',flexDirection:'column',position:'fixed',top:0,bottom:0,left:0,zIndex:100}}>
        <div style={{padding:'24px 20px 20px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{color:'rgba(255,255,255,0.5)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,marginBottom:4}}>Koekela</div>
          <div style={{color:'#fff',fontSize:18,fontWeight:900,lineHeight:1.1}}>Spaza Shop</div>
          <div style={{color:'rgba(255,255,255,0.4)',fontSize:11,marginTop:4}}>Computer Dashboard</div>
        </div>
        <nav style={{flex:1,padding:'12px 0'}}>
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>setSection(n.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 20px',
                background:section===n.id?'rgba(255,255,255,0.12)':'transparent',
                border:'none',cursor:'pointer',color:section===n.id?'#fff':'rgba(255,255,255,0.55)',
                fontSize:14,fontWeight:section===n.id?800:600,textAlign:'left',
                borderLeft:section===n.id?`3px solid ${C.gold}`:'3px solid transparent'}}>
              <span style={{fontSize:16}}>{n.icon}</span>
              {n.label}
            </button>
          ))}
        </nav>
        <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.1)'}}>
          {liveFlash&&(
            <div style={{display:'flex',alignItems:'center',gap:8,color:C.gold,fontSize:12,fontWeight:700,marginBottom:10}}>
              <div style={{width:8,height:8,borderRadius:4,background:C.gold}}/>
              Live update received
            </div>
          )}
          <div style={{color:'rgba(255,255,255,0.4)',fontSize:11,marginBottom:10}}>
            {new Date().toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short'})}
          </div>
          <button onClick={handleBackup}
            style={{width:'100%',background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:8,padding:'9px',color:'rgba(255,255,255,0.7)',fontSize:12,fontWeight:700,cursor:'pointer'}}>
            📥 Quick Backup
          </button>
        </div>
      </div>

      {/* Main content */}
      <div style={{marginLeft:220,flex:1,minHeight:'100vh',display:'flex',flexDirection:'column'}}>
        {/* Backup banner */}
        <BackupBanner onBackup={handleBackup} lastBackup={lastBackup}/>

        {/* Top bar */}
        <div className="no-print" style={{background:C.white,padding:'14px 32px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:50,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
          <h1 style={{fontSize:18,fontWeight:900,color:C.text}}>{navItems.find(n=>n.id===section)?.label}</h1>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <a href="Koekela App.html" target="_blank" rel="noopener noreferrer"
              style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:9,padding:'8px 14px',color:C.text,fontSize:12,fontWeight:700,textDecoration:'none',display:'flex',alignItems:'center',gap:6}}>
              📱 Phone App
            </a>
            <button onClick={()=>window.print()}
              style={{background:C.navy,border:'none',borderRadius:9,padding:'8px 16px',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>
              🖨️ Print
            </button>
          </div>
        </div>

        {/* Section content */}
        <div style={{padding:'28px 32px',flex:1}}>
          {section==='overview'&&<Overview data={data} setData={setData} setSection={setSection} setToast={setToast}/>}
          {section==='customers'&&<CustomersSection data={data} setData={setData} setToast={setToast}/>}
          {section==='stock'&&<StockSection data={data} setData={setData} setToast={setToast}/>}
          {section==='reports'&&<ReportsSection data={data}/>}
          {section==='settings'&&<SettingsSection data={data} setData={setData} setToast={setToast} lastBackup={lastBackup} onBackup={()=>setLastBackup(Date.now().toString())}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>
