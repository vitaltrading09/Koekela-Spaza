// ─────────────────────────────────────────────────────────────
// INDEXEDDB HELPER — secondary storage layer
// ─────────────────────────────────────────────────────────────
const IDB={
  _db:null,
  open(){
    if(this._db)return Promise.resolve(this._db);
    return new Promise((res,rej)=>{
      const r=indexedDB.open('KoekelDB',1);
      r.onupgradeneeded=e=>e.target.result.createObjectStore('s',{keyPath:'k'});
      r.onsuccess=e=>{this._db=e.target.result;res(this._db);};
      r.onerror=()=>rej(r.error);
    });
  },
  get(key){
    return this.open().then(db=>new Promise(res=>{
      const r=db.transaction('s','readonly').objectStore('s').get(key);
      r.onsuccess=()=>res(r.result?.v);
      r.onerror=()=>res(null);
    })).catch(()=>null);
  },
  set(key,val){
    return this.open().then(db=>new Promise(res=>{
      const tx=db.transaction('s','readwrite');
      tx.objectStore('s').put({k:key,v:val});
      tx.oncomplete=res;tx.onerror=res;
    })).catch(()=>{});
  }
};

function simpleHash(str){
  let h=5381;
  for(let i=0;i<str.length;i++)h=((h<<5)+h)+str.charCodeAt(i),h=h&h;
  return h.toString(36);
}

function loadData(){
  // Primary
  try{const r=localStorage.getItem('koekela_data');if(r){const d=JSON.parse(r);if(d?.products&&d?.customers)return d;}}catch(e){}
  // Shadow fallback
  try{const r=localStorage.getItem('koekela_data_bak');if(r){const d=JSON.parse(r);if(d?.products&&d?.customers){_persist(d);return d;}}}catch(e){}
  return{products:SEED_PRODUCTS,customers:SEED_CUSTOMERS,transactions:SEED_TX,lang:'en'};
}

function _persist(d){
  const j=JSON.stringify(d);
  try{localStorage.setItem('koekela_data',j);}catch(e){}
  try{localStorage.setItem('koekela_data_bak',j);}catch(e){}
  IDB.set('koekela_data',d);
}

function saveData(d){
  _persist(d);
  try{new BroadcastChannel('koekela_sync').postMessage({type:'update',data:d});}catch(e){}
  saveToCloud(d).catch(()=>{});
}

// ─────────────────────────────────────────────────────────────
// CLOUD SYNC — Supabase
// ─────────────────────────────────────────────────────────────
function getSBConfig(){
  return{
    url:localStorage.getItem('koekela_sb_url')||'',
    key:localStorage.getItem('koekela_sb_key')||'',
    shopId:localStorage.getItem('koekela_shop_id')||''
  };
}
function getSBClient(){
  const{url,key}=getSBConfig();
  if(!url||!key||!window.supabase)return null;
  try{return window.supabase.createClient(url,key);}catch(e){return null;}
}
async function saveToCloud(d){
  const sb=getSBClient();const{shopId}=getSBConfig();
  if(!sb||!shopId)return;
  const{error}=await sb.from('shop_data').upsert(
    {shop_id:shopId,data:d,updated_at:new Date().toISOString()},
    {onConflict:'shop_id'}
  );
  if(error)throw error;
}
async function loadFromCloud(){
  const sb=getSBClient();const{shopId}=getSBConfig();
  if(!sb||!shopId)return null;
  try{
    const{data,error}=await sb.from('shop_data').select('data').eq('shop_id',shopId).single();
    if(error||!data)return null;
    return data.data;
  }catch(e){return null;}
}
function subscribeToCloud(cb){
  const sb=getSBClient();const{shopId}=getSBConfig();
  if(!sb||!shopId)return null;
  try{
    return sb.channel('koekela-'+shopId)
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'shop_data',filter:'shop_id=eq.'+shopId},
        payload=>{if(payload.new?.data)cb(payload.new.data);})
      .subscribe();
  }catch(e){return null;}
}

  return'x'+Math.random().toString(36).slice(2)+Date.now().toString(36);

function Btn({children,onClick,variant='primary',small=false,style:s={},disabled=false}){
  const variants={
    primary:{bg:C.navy,color:'#fff',border:'none'},
    gold:{bg:C.gold,color:C.navyDark,border:'none'},
    danger:{bg:C.danger,color:'#fff',border:'none'},
    dangerOutline:{bg:'transparent',color:C.danger,border:`2px solid ${C.danger}`},
    outline:{bg:'transparent',color:C.navy,border:`2px solid ${C.navy}`},
    ghost:{bg:C.bg,color:C.text,border:`1.5px solid ${C.border}`},
    success:{bg:C.success,color:'#fff',border:'none'},
    purple:{bg:C.purple,color:'#fff',border:'none'},
  };
  const v=variants[variant]||variants.primary;
  return(
    <button onClick={onClick} disabled={disabled}
      style={{background:v.bg,color:v.color,border:v.border,borderRadius:12,
        padding:small?'8px 14px':'13px 20px',fontSize:small?13:15,fontWeight:700,
        cursor:disabled?'not-allowed':'pointer',opacity:disabled?.5:1,
        display:'flex',alignItems:'center',justifyContent:'center',gap:6,lineHeight:1,...s}}>
      {children}
    </button>
  );
}

  React.useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'absolute',bottom:95,left:16,right:16,zIndex:200,
      background:C.navyDark,color:'#fff',borderRadius:14,padding:'14px 18px',
      fontSize:14,fontWeight:700,textAlign:'center',boxShadow:'0 4px 20px rgba(0,0,0,0.3)',

    </div>
  );

// BARCODE SCANNER
// ─────────────────────────────────────────────────────────────
function BarcodeScanner({onScan,onClose,t}){
  const videoRef=React.useRef(null);
  const [err,setErr]=React.useState(null);
  const [manual,setManual]=React.useState('');
  const [ready,setReady]=React.useState(false);
  const streamRef=React.useRef(null);
  const timerRef=React.useRef(null);

  React.useEffect(()=>{
    let mounted=true;
    async function start(){
      try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}});
        if(!mounted){stream.getTracks().forEach(tr=>tr.stop());return;}
        streamRef.current=stream;
        if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
        setReady(true);
        if('BarcodeDetector' in window){
          const det=new BarcodeDetector({formats:['ean_13','ean_8','code_128','upc_a','upc_e','qr_code']});
          timerRef.current=setInterval(async()=>{
            try{const codes=await det.detect(videoRef.current);if(codes.length>0){stop();onScan(codes[0].rawValue);}}catch(e){}
          },400);
        }
      }catch(e){if(mounted)setErr(true);}
    }
    start();
    return()=>{mounted=false;stop();};
  },[]);

  function stop(){
    if(timerRef.current)clearInterval(timerRef.current);
    if(streamRef.current)streamRef.current.getTracks().forEach(tr=>tr.stop());
  }

  return(
    <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.95)',zIndex:150,display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:`${16+SAFE_TOP}px 20px 20px`}}>
        <div style={{color:'#fff',fontSize:18,fontWeight:800}}>{t.scanBarcode}</div>
        <Btn onClick={()=>{stop();onClose();}} variant='ghost' small>{t.cancel}</Btn>
      </div>
      {!err?(
        <div style={{flex:1,position:'relative',padding:'0 20px',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <video ref={videoRef} muted playsInline style={{width:'100%',maxHeight:280,borderRadius:16,objectFit:'cover',background:'#000'}}/>
          {ready&&(
            <div style={{position:'absolute',inset:'20px',border:'2.5px solid rgba(255,255,255,0.4)',borderRadius:16,pointerEvents:'none'}}>
              <div style={{position:'absolute',top:'50%',left:'10%',right:'10%',height:2.5,background:C.gold,transform:'translateY(-50%)',borderRadius:2}}/>
              <div style={{position:'absolute',top:8,left:8,width:20,height:20,borderTop:`3px solid ${C.gold}`,borderLeft:`3px solid ${C.gold}`,borderRadius:'4px 0 0 0'}}/>
              <div style={{position:'absolute',top:8,right:8,width:20,height:20,borderTop:`3px solid ${C.gold}`,borderRight:`3px solid ${C.gold}`,borderRadius:'0 4px 0 0'}}/>
              <div style={{position:'absolute',bottom:8,left:8,width:20,height:20,borderBottom:`3px solid ${C.gold}`,borderLeft:`3px solid ${C.gold}`,borderRadius:'0 0 0 4px'}}/>
              <div style={{position:'absolute',bottom:8,right:8,width:20,height:20,borderBottom:`3px solid ${C.gold}`,borderRight:`3px solid ${C.gold}`,borderRadius:'0 0 4px 0'}}/>
            </div>
          )}
        </div>
      ):(
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 30px',textAlign:'center'}}>
          <div>
            <div style={{fontSize:40,marginBottom:12}}>📷</div>
            <div style={{color:'rgba(255,255,255,0.5)',fontSize:13}}>{t.noCameraFallback}</div>
          </div>
        </div>
      )}
      <div style={{padding:'20px 20px 50px'}}>
        <div style={{color:'rgba(255,255,255,0.4)',fontSize:12,textAlign:'center',marginBottom:8}}>— or enter manually —</div>
        <div style={{display:'flex',gap:10}}>
          <input value={manual} onChange={e=>setManual(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&manual.trim()){stop();onScan(manual.trim());}}}
            placeholder={t.enterBarcode} autoFocus={!!err}
            style={{flex:1,background:'rgba(255,255,255,0.1)',border:'1.5px solid rgba(255,255,255,0.2)',borderRadius:12,padding:'13px 14px',color:'#fff',fontSize:15,outline:'none'}}/>
          <Btn onClick={()=>{if(manual.trim()){stop();onScan(manual.trim());}}} variant='gold'>{t.confirm}</Btn>
        </div>
      </div>
    </div>
  );
}

// BACKUP BANNER
// ─────────────────────────────────────────────────────────────
function BackupBanner({onBackup,lastBackup}){
  const [dismissed,setDismissed]=React.useState(false);
  if(dismissed)return null;
  const needed=!lastBackup||(Date.now()-parseInt(lastBackup)>24*60*60*1000);
  if(!needed)return null;
  const lastStr=lastBackup?new Date(parseInt(lastBackup)).toLocaleDateString('en-ZA'):'Never';
  return(
    <div style={{background:C.purple,margin:'12px 16px 0',borderRadius:12,padding:'10px 14px',display:'flex',alignItems:'center',gap:10,animation:'fadeIn .3s ease'}}>
      <span style={{fontSize:18}}>⚠️</span>
      <div style={{flex:1,color:'#fff'}}>
        <div style={{fontWeight:800,fontSize:13}}>Backup Recommended</div>
        <div style={{fontSize:11,opacity:.8}}>Last backup: {lastStr}</div>
      </div>
      <Btn onClick={onBackup} variant='gold' small style={{flexShrink:0}}>Backup Now</Btn>
      <button onClick={()=>setDismissed(true)} style={{background:'none',border:'none',color:'rgba(255,255,255,0.7)',cursor:'pointer',fontSize:20,lineHeight:1,paddingLeft:2}}>✕</button>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PIN SCREEN
// ─────────────────────────────────────────────────────────────
function PINScreen({onUnlock,hasPin}){
  const [digits,setDigits]=React.useState([]);
  const [phase,setPhase]=React.useState(hasPin?'enter':'setup');
  const [pending,setPending]=React.useState(null);
  const [shake,setShake]=React.useState(false);
  const [msg,setMsg]=React.useState(hasPin?'Enter your PIN':'Create a 4-digit PIN');
  const [attempts,setAttempts]=React.useState(0);

  const now=new Date();
  const timeStr=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');

  function press(d){
    if(digits.length>=4||shake)return;
    const nd=[...digits,d];
    setDigits(nd);
    if(nd.length===4)setTimeout(()=>submit(nd),140);
  }

  function del(){setDigits(d=>d.slice(0,-1));}

  function doShake(errMsg){
    setShake(true);setDigits([]);setMsg(errMsg);
    setTimeout(()=>setShake(false),500);
  }

  function submit(nd){
    const str=nd.join('');
    if(phase==='setup'){
      setPending(str);setPhase('confirm');setDigits([]);setMsg('Confirm your PIN');
    } else if(phase==='confirm'){
      if(str===pending){
        localStorage.setItem('koekela_pin',simpleHash(str));
        onUnlock();
      } else {
        doShake('PINs don\'t match — try again');
        setPhase('setup');setPending(null);
      }
    } else {
      const stored=localStorage.getItem('koekela_pin');
      if(simpleHash(str)===stored){
        onUnlock();
      } else {
        const a=attempts+1;setAttempts(a);
        doShake(a>=5?'Too many attempts — see below':'Wrong PIN');
      }
    }
  }

  function resetPIN(){
    if(window.confirm('This clears your PIN. The app will ask you to set a new one.\nContinue?')){
      localStorage.removeItem('koekela_pin');
      setPhase('setup');setAttempts(0);setDigits([]);setPending(null);setMsg('Create a new 4-digit PIN');
    }
  }

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',background:C.navyDark,padding:'0 32px'}}>
      {/* Status bar area */}
      <div style={{width:'100%',color:'rgba(255,255,255,0.6)',fontSize:16,fontWeight:600,padding:`${IS_STANDALONE?20:10}px 0 0`,textAlign:'center'}}>{timeStr}</div>

      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',width:'100%',maxWidth:320}}>
        <div style={{fontSize:44,marginBottom:6}}>🛒</div>
        <div style={{color:'rgba(255,255,255,0.45)',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:2,marginBottom:2}}>Koekela Spaza</div>
        <div style={{color:C.gold,fontSize:20,fontWeight:900,marginBottom:32}}>
          {phase==='enter'?'Welcome back':''}
        </div>

        <div style={{fontSize:14,color:'rgba(255,255,255,0.65)',fontWeight:600,marginBottom:24,textAlign:'center'}}>{msg}</div>

        {/* PIN dots */}
        <div style={{display:'flex',gap:16,marginBottom:44,animation:shake?'shake 0.45s ease':'none'}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:16,height:16,borderRadius:8,
              background:digits.length>i?C.gold:'rgba(255,255,255,0.2)',
              transition:'background 0.12s ease',
              boxShadow:digits.length>i?`0 0 8px ${C.gold}55`:'none'}}/>
          ))}
        </div>

        {/* Keypad */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,72px)',gap:12,marginBottom:28}}>
          {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k,i)=>{
            if(k==='')return<div key={i}/>;
            return(
              <div key={i}
                className="pin-btn"
                onClick={k==='⌫'?del:()=>press(k)}
                style={{
                  width:72,height:72,borderRadius:36,
                  background:k==='⌫'?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.14)',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:k==='⌫'?22:28,fontWeight:700,color:'#fff',
                  cursor:'pointer',userSelect:'none',
                  transition:'background .1s',
                }}
              >{k}</div>
            );
          })}
        </div>

        {/* Reset / Skip */}
        {hasPin&&attempts>=3&&(
          <button onClick={resetPIN}
            style={{background:'none',border:'1px solid rgba(255,255,255,0.25)',borderRadius:10,
              padding:'10px 24px',color:'rgba(255,255,255,0.55)',fontSize:13,cursor:'pointer',fontWeight:600}}>
            Forgot PIN? Reset
          </button>
        )}
        {!hasPin&&(
          <button onClick={onUnlock}
            style={{background:'none',border:'none',color:'rgba(255,255,255,0.3)',fontSize:12,cursor:'pointer',fontWeight:600,marginTop:4}}>
            Skip PIN setup
          </button>
        )}
      </div>
    </div>
  );
}

const IS_STANDALONE=window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone===true;
// Desktop preview = inside IOSDevice frame on a big screen (needs clearance for drawn status bar)
const IS_DESKTOP_PREVIEW=!IS_STANDALONE&&window.innerWidth>430;
// Manage safe-area padding ourselves when: installed PWA, or desktop preview (IOSDevice draws its own bar)
const SAFE_TOP=(IS_STANDALONE||IS_DESKTOP_PREVIEW)?44:0;
const SAFE_BOTTOM=(IS_STANDALONE||IS_DESKTOP_PREVIEW)?20:0;

function AppHeader({title,lang,setLang,onBack,rightSlot}){
  return(
    <div style={{background:C.navy,padding:`${14+SAFE_TOP}px 16px 14px`,display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,flexShrink:0}}>
      {onBack?(
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.15)',border:'none',cursor:'pointer',color:'#fff',borderRadius:10,padding:'8px 14px',fontSize:13,fontWeight:700,whiteSpace:'nowrap'}}>‹ {onBack===true?'Back':onBack}</button>
      ):(
        <div>
          <div style={{color:'rgba(255,255,255,0.55)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>Koekela Spaza</div>
          <div style={{color:'#fff',fontSize:19,fontWeight:900,lineHeight:1.1}}>{title}</div>
        </div>
      )}
      {onBack&&<div style={{color:'#fff',fontSize:17,fontWeight:800,flex:1,paddingLeft:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{title}</div>}
      <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
        {rightSlot}
        <button onClick={()=>setLang(l=>l==='en'?'af':'en')}
          style={{background:'rgba(255,255,255,0.15)',border:'none',cursor:'pointer',color:'#fff',borderRadius:10,padding:'7px 11px',fontSize:12,fontWeight:800}}>
          {lang==='en'?'AF':'EN'}
        </button>
      </div>
    </div>
  );
}

        {openTxs.length===0&&(
          <Card><div style={{textAlign:'center',color:C.success,fontSize:14,fontWeight:700,padding:'8px 0'}}>✓ {t.allClear}</div></Card>
        )}
        {openTxs.slice(0,6).map(tx=>(
          <Card key={tx.id} onClick={()=>setTab('customers')}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:800,fontSize:14}}>{tx.customerName}</div>
                <div style={{color:C.muted,fontSize:12,marginTop:1}}>{fmtDate(tx.date)} · {tx.items.length} {t.items}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:900,fontSize:16,color:C.navy}}>{fmt(tx.total)}</div>
                <Badge label={t.outstanding} color={C.amber}/>
              </div>
            </div>
          </Card>
        ))}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:4}}>
          <button onClick={onOpenSettings}
            style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'12px',cursor:'pointer',color:C.text,fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            ⚙️ {t.settings}
          </button>
          <a href="Koekela Dashboard.html" target="_blank" rel="noopener noreferrer"
            style={{background:C.navy,borderRadius:12,padding:'12px',color:'#fff',fontSize:12,fontWeight:700,textDecoration:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            🖥️ {lang==='af'?'Rekenaar':'Dashboard'}

      <div style={{height:24}}/>
    </div>
  );
}

// STOCK RECEIVE MODAL
// ─────────────────────────────────────────────────────────────
function StockReceiveModal({data,setData,t,lang,onClose,onDone}){
  const [received,setReceived]=React.useState([]);
  const [scanning,setScanning]=React.useState(false);
  const [search,setSearch]=React.useState('');
  const [selectedProd,setSelectedProd]=React.useState(null);
  const [qty,setQty]=React.useState('1');
  const [notFound,setNotFound]=React.useState('');
  const qtyRef=React.useRef(null);

  function handleScan(code){
    setScanning(false);setNotFound('');
    const p=data.products.find(x=>x.barcode===code);
    if(p){setSelectedProd(p);setQty('1');setTimeout(()=>qtyRef.current&&qtyRef.current.focus(),100);}
    else setNotFound(code);
  }

  function addItem(){
    if(!selectedProd)return;
    const q=parseInt(qty);
    if(isNaN(q)||q<=0)return;
    setReceived(r=>{
      const ex=r.find(i=>i.product.id===selectedProd.id);
      if(ex)return r.map(i=>i.product.id===selectedProd.id?{...i,qty:i.qty+q}:i);
      return[...r,{product:{...selectedProd},qty:q}];
    });
    setSelectedProd(null);setQty('1');setSearch('');setNotFound('');
  }

  function removeItem(id){setReceived(r=>r.filter(i=>i.product.id!==id));}

  function confirm(){
    if(received.length===0)return;
    const updatedProducts=data.products.map(p=>{
      const item=received.find(i=>i.product.id===p.id);
      if(!item)return p;
      return{...p,stock_qty:(typeof p.stock_qty==='number'?p.stock_qty:0)+item.qty};
    });
    const nd={...data,products:updatedProducts};
    setData(nd);saveData(nd);
    onDone(t.stockUpdated);
  }

  const filteredProds=search?data.products.filter(p=>
    p.name.toLowerCase().includes(search.toLowerCase())||
    (p.nameAf||'').toLowerCase().includes(search.toLowerCase())||
    p.barcode.includes(search)
  ):[];

  return(
    <>
      {scanning&&<BarcodeScanner t={t} onScan={handleScan} onClose={()=>setScanning(false)}/>}
      <Modal title={`📥 ${t.receiveStock}`} onClose={onClose}>
        <div style={{paddingTop:12}}>
          <div style={{background:'#EFF6FF',borderRadius:10,padding:'10px 12px',marginBottom:12,fontSize:12,color:'#1E40AF',lineHeight:1.5}}>
            💡 {lang==='af'?'Skandeer strepieskode op afleweringsnota, of soek produk handmatig':'Scan the barcode on a delivery note, or search manually to receive stock'}
          </div>

          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <input value={search} onChange={e=>{setSearch(e.target.value);setSelectedProd(null);}}
              placeholder={lang==='af'?'Soek produk...':'Search product...'}
              style={{flex:1,background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'10px 12px',fontSize:14,outline:'none'}}/>
            <Btn onClick={()=>{setScanning(true);setSearch('');}} variant='gold' small>📷 Scan</Btn>
          </div>

          {filteredProds.length>0&&!selectedProd&&(
            <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:10,maxHeight:160,overflow:'auto'}}>
              {filteredProds.slice(0,6).map(p=>(
                <div key={p.id} onClick={()=>{setSelectedProd(p);setSearch('');setQty('1');setTimeout(()=>qtyRef.current&&qtyRef.current.focus(),80);}}
                  style={{padding:'10px 12px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13}}>{lang==='af'&&p.nameAf?p.nameAf:p.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>📦 {lang==='af'?'Huidig':'Current'}: {typeof p.stock_qty==='number'?p.stock_qty:'—'}</div>
                  </div>
                  <Badge label={fmt(p.sellPrice)} color={C.navyLight}/>
                </div>
              ))}
            </div>
          )}

          {notFound&&(
            <div style={{background:C.dangerLight,border:`1px solid ${C.danger}`,borderRadius:8,padding:'8px 12px',marginBottom:8,fontSize:12,color:C.danger,fontWeight:600}}>
              ⚠️ {lang==='af'?`Kode "${notFound}" nie gevind nie`:`Barcode "${notFound}" not found`}
            </div>
          )}

          {selectedProd&&(
            <div style={{background:C.successLight,border:`1px solid ${C.success}`,borderRadius:10,padding:'12px',marginBottom:10}}>
              <div style={{fontWeight:800,fontSize:14,color:C.success,marginBottom:8}}>✓ {selectedProd.name}</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:8,alignItems:'flex-end'}}>
                <div>
                  <div style={{fontSize:12,color:C.muted,marginBottom:4}}>{lang==='af'?'Hoeveelheid ontvang:':'Quantity received:'}</div>
                  <input ref={qtyRef} value={qty} onChange={e=>setQty(e.target.value)} type="number" min="1"
                    onKeyDown={e=>e.key==='Enter'&&addItem()}
                    style={{width:'100%',background:C.white,border:`2px solid ${C.success}`,borderRadius:8,padding:'10px 12px',fontSize:18,fontWeight:800,outline:'none',textAlign:'center'}}/>
                </div>
                <Btn onClick={addItem} variant='success'>+ {lang==='af'?'Voeg by':'Add'}</Btn>
              </div>
            </div>
          )}

          {received.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:'uppercase',marginBottom:6}}>{t.itemsToReceive}:</div>
              {received.map(i=>(
                <div key={i.product.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:C.bg,borderRadius:8,padding:'8px 12px',marginBottom:6}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13}}>{i.product.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>
                      {typeof i.product.stock_qty==='number'?i.product.stock_qty:0} → {(typeof i.product.stock_qty==='number'?i.product.stock_qty:0)+i.qty}
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontWeight:900,fontSize:16,color:C.success}}>+{i.qty}</span>
                    <button onClick={()=>removeItem(i.product.id)} style={{background:C.dangerLight,border:`1px solid ${C.danger}`,color:C.danger,borderRadius:6,padding:'4px 8px',fontSize:11,cursor:'pointer',fontWeight:700}}>✕</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          <Btn onClick={confirm} variant='success' style={{width:'100%',marginBottom:10}} disabled={received.length===0}>
            ✓ {lang==='af'?'Dateer Voorraad Op':'Update Stock'} ({received.length} {lang==='af'?'produkte':'products'})
          </Btn>
          <div style={{height:10}}/>
        </div>
      </Modal>
    </>
  );
}

function InventoryScreen({data,setData,t,lang}){
  const [search,setSearch]=React.useState('');
  const [modal,setModal]=React.useState(null);
  const [scanning,setScanning]=React.useState(false);
  const [form,setForm]=React.useState({barcode:'',name:'',nameAf:'',costPrice:'',sellPrice:'',markup:'20',category:'food',stock_qty:''});
  const [err,setErr]=React.useState('');
  const [deleteConfirm,setDeleteConfirm]=React.useState(null);
  const [receiveModal,setReceiveModal]=React.useState(false);
  const [toast,setToast]=React.useState('');
  const catColors={food:C.success,drinks:C.navyLight,snacks:C.amber,household:C.purple,other:C.muted};

  const products=data.products.filter(p=>
    p.name.toLowerCase().includes(search.toLowerCase())||
    (p.nameAf||'').toLowerCase().includes(search.toLowerCase())||
    p.barcode.includes(search)
  );

  function openAdd(barcode=''){setForm({barcode,name:'',nameAf:'',costPrice:'',sellPrice:'',markup:'20',category:'food',stock_qty:''});setErr('');setModal('add');}
  function openEdit(p){setForm({barcode:p.barcode,name:p.name,nameAf:p.nameAf||'',costPrice:String(p.costPrice),sellPrice:String(p.sellPrice),markup:String(p.markup),category:p.category||'food',stock_qty:typeof p.stock_qty==='number'?String(p.stock_qty):''});setErr('');setModal(p);}

  function calcSell(){
    const c=parseFloat(form.costPrice),m=parseFloat(form.markup);
    if(isNaN(c)||isNaN(m)){setErr('Enter valid cost price and markup first');return;}
    setForm(f=>({...f,sellPrice:(c*(1+m/100)).toFixed(2)}));
  }

  function save(){
    if(!form.name.trim()){setErr(t.enterName);return;}
    if(!form.barcode.trim()){setErr(t.enterBarcode);return;}
    const cp=parseFloat(form.costPrice);const sp=parseFloat(form.sellPrice);
    if(isNaN(cp)||cp<0){setErr('Enter a valid cost price');return;}
    if(isNaN(sp)||sp<0){setErr('Enter a valid sell price');return;}
    if(modal==='add'&&data.products.find(p=>p.barcode===form.barcode.trim())){setErr(t.productExists);return;}
    const sqv=form.stock_qty.trim();
    const prod={
      id:modal==='add'?uid():modal.id,barcode:form.barcode.trim(),
      name:form.name.trim(),nameAf:form.nameAf.trim(),
      costPrice:cp,sellPrice:sp,markup:parseFloat(form.markup)||0,category:form.category,
      stock_qty:sqv===''?null:Math.max(0,parseInt(sqv)||0)
    };
    const nd={...data,products:modal==='add'?[...data.products,prod]:data.products.map(p=>p.id===prod.id?prod:p)};
    setData(nd);saveData(nd);setModal(null);
  }

  function doDelete(id){
    const nd={...data,products:data.products.filter(p=>p.id!==id)};
    setData(nd);saveData(nd);setModal(null);setDeleteConfirm(null);
  }

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg,position:'relative'}}>
      {scanning&&<BarcodeScanner t={t} onScan={code=>{setScanning(false);openAdd(code);}} onClose={()=>setScanning(false)}/>}
      {receiveModal&&<StockReceiveModal data={data} setData={setData} t={t} lang={lang} onClose={()=>setReceiveModal(false)} onDone={(msg)=>{setReceiveModal(false);setToast(msg);}}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
      {deleteConfirm&&<ConfirmDialog title={t.deleteItem} message={`Delete "${deleteConfirm.name}"?`} onConfirm={()=>doDelete(deleteConfirm.id)} onCancel={()=>setDeleteConfirm(null)} confirmLabel={t.deleteItem}/>}

      <div style={{padding:'10px 14px 8px',flexShrink:0}}>
        <div style={{display:'flex',gap:8}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.search}
            style={{flex:1,background:C.white,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'10px 14px',fontSize:14,outline:'none'}}/>
          <Btn onClick={()=>setScanning(true)} variant='gold' small>📷 Scan</Btn>
          <Btn onClick={()=>openAdd()} variant='primary' small>+ {lang==='af'?'Voeg by':'Add'}</Btn>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6}}>
          <div style={{color:C.muted,fontSize:12,fontWeight:600}}>
            {products.length} {lang==='af'?'produkte':'products'} · {lang==='af'?'Tik om te wysig':'Tap to edit'}
          </div>
          <Btn onClick={()=>setReceiveModal(true)} variant='success' small>📥 {t.receiveStock}</Btn>
        </div>
      </div>

      <div style={{flex:1,overflow:'auto',padding:'0 14px'}}>
        {products.length===0&&<div style={{textAlign:'center',color:C.muted,fontSize:14,padding:'40px 0'}}>{t.noProducts}</div>}
        {products.map(p=>(
          <Card key={p.id} onClick={()=>openEdit(p)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <span style={{fontWeight:800,fontSize:14}}>{lang==='af'&&p.nameAf?p.nameAf:p.name}</span>
                  <Badge label={t[p.category]||p.category} color={catColors[p.category]||C.muted}/>
                </div>
                <div style={{color:C.muted,fontSize:11,marginTop:2,fontFamily:'monospace'}}>{p.barcode}</div>
                <div style={{color:C.muted,fontSize:12,marginTop:2}}>Cost {fmt(p.costPrice)} · Markup {p.markup}%</div>
                {typeof p.stock_qty==='number'&&(
                  <div style={{fontSize:11,fontWeight:700,marginTop:3,color:p.stock_qty===0?C.danger:p.stock_qty<=3?C.amber:C.success}}>
                    📦 {p.stock_qty===0?t.outOfStock:`${p.stock_qty} ${lang==='af'?'in voorraad':'in stock'}`}
                  </div>
                )}
              </div>
              <div style={{textAlign:'right',paddingLeft:10}}>
                <div style={{fontWeight:900,fontSize:18,color:C.navy}}>{fmt(p.sellPrice)}</div>
                <div style={{color:C.success,fontSize:11,fontWeight:600}}>profit {fmt(p.sellPrice-p.costPrice)}</div>
              </div>
            </div>
          </Card>
        ))}
        <div style={{height:20}}/>
      </div>

      {modal&&(
        <Modal title={modal==='add'?t.addProduct:`${t.edit}: ${modal.name||''}`} onClose={()=>setModal(null)}>
          <div style={{paddingTop:16}}>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1}}><Input label={t.barcode} value={form.barcode} onChange={e=>setForm(f=>({...f,barcode:e.target.value}))} placeholder={t.enterBarcode}/></div>
              <Btn onClick={()=>{setModal(null);setScanning(true);}} variant='gold' small style={{alignSelf:'flex-end',marginBottom:12}}>📷</Btn>
            </div>
            <Input label={`${t.productName} (English)`} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder={t.enterName}/>
            <Input label={`${t.productName} (Afrikaans)`} value={form.nameAf} onChange={e=>setForm(f=>({...f,nameAf:e.target.value}))} placeholder="Optional"/>
            <Sel label={t.category} value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
              options={['food','drinks','snacks','household','other'].map(c=>({v:c,l:t[c]||c}))}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <Input label={t.costPrice} value={form.costPrice} onChange={e=>setForm(f=>({...f,costPrice:e.target.value}))} type="number"/>
              <Input label={t.markup} value={form.markup} onChange={e=>setForm(f=>({...f,markup:e.target.value}))} type="number"/>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
              <div style={{flex:1}}><Input label={t.sellPrice} value={form.sellPrice} onChange={e=>setForm(f=>({...f,sellPrice:e.target.value}))} type="number"/></div>
              <Btn onClick={calcSell} variant='ghost' small style={{marginBottom:12}}>Auto ↻</Btn>
            </div>
            <div style={{fontSize:11,color:C.muted,marginBottom:12}}>↑ {t.autoCalc}</div>
            <Input label={`📦 ${t.stockQty}`} value={form.stock_qty} onChange={e=>setForm(f=>({...f,stock_qty:e.target.value}))} type="number"
              note={lang==='af'?'Hoeveel eenhede in voorraad (los leeg as nie gevolg)':'How many units in stock (leave empty = not tracked)'}/>
            {err&&<div style={{color:C.danger,fontSize:13,marginBottom:10,fontWeight:600,background:C.dangerLight,padding:'8px 12px',borderRadius:8}}>{err}</div>}
            <Btn onClick={save} variant='primary' style={{width:'100%',marginBottom:10}}>{t.save}</Btn>
            {modal!=='add'&&<Btn onClick={()=>setDeleteConfirm(modal)} variant='dangerOutline' style={{width:'100%'}}>🗑️ {t.deleteItem}: {modal.name}</Btn>}
            <div style={{height:10}}/>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SALE SCREEN
// ─────────────────────────────────────────────────────────────
function SaleScreen({data,setData,t,lang,setTab}){
  const [step,setStep]=React.useState(1);
  const [customer,setCustomer]=React.useState(null);
  const [basket,setBasket]=React.useState([]);
  const [scanning,setScanning]=React.useState(false);
  const [search,setSearch]=React.useState('');
  const [toast,setToast]=React.useState('');
  const [notFound,setNotFound]=React.useState('');

  function handleScan(code){
    setScanning(false);setNotFound('');
    const p=data.products.find(x=>x.barcode===code);
    if(p)addToBasket(p);else setNotFound(code);
  }

  function addToBasket(p){
    setBasket(b=>{
      const ex=b.find(i=>i.productId===p.id);
      if(ex)return b.map(i=>i.productId===p.id?{...i,qty:i.qty+1,total:parseFloat(((i.qty+1)*i.price).toFixed(2))}:i);
      return [...b,{productId:p.id,name:lang==='af'&&p.nameAf?p.nameAf:p.name,qty:1,price:p.sellPrice,total:p.sellPrice}];
    });
    setSearch('');
  }

  function changeQty(id,delta){
    setBasket(b=>b.map(i=>{
      if(i.productId!==id)return i;
      const qty=Math.max(0,i.qty+delta);
      return{...i,qty,total:parseFloat((qty*i.price).toFixed(2))};
    }).filter(i=>i.qty>0));
  }

  function removeItem(id){setBasket(b=>b.filter(i=>i.productId!==id));}
  const basketTotal=basket.reduce((s,i)=>s+i.total,0);

  function confirmSale(){
    const tx={id:uid(),customerId:customer.id,customerName:customer.name,date:new Date().toISOString(),items:[...basket],total:basketTotal,status:'open'};
    const newCust=data.customers.map(c=>c.id===customer.id?{...c,balance:parseFloat((c.balance+basketTotal).toFixed(2))}:c);
    // Deduct stock quantities
    const updatedProducts=data.products.map(p=>{
      const soldItem=basket.find(i=>i.productId===p.id);
      if(!soldItem||typeof p.stock_qty!=='number')return p;
      return{...p,stock_qty:Math.max(0,p.stock_qty-soldItem.qty)};
    });
    const nd={...data,transactions:[...data.transactions,tx],customers:newCust,products:updatedProducts};
    setData(nd);saveData(nd);
    setToast(t.addedToCredit);
    setBasket([]);setCustomer(null);setStep(1);setNotFound('');
    setTimeout(()=>{setToast('');setTab('customers');},2000);
  }

  const filteredProds=data.products.filter(p=>
    !search||(p.name.toLowerCase().includes(search.toLowerCase())||(p.nameAf||'').toLowerCase().includes(search.toLowerCase()))
  );

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg,position:'relative'}}>
      {scanning&&<BarcodeScanner t={t} onScan={handleScan} onClose={()=>setScanning(false)}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}

      <div style={{background:C.white,padding:'8px 20px',display:'flex',gap:6,alignItems:'center',flexShrink:0,borderBottom:`1px solid ${C.border}`}}>
        {[{n:1,l:t.selectCustomer},{n:2,l:t.basket},{n:3,l:t.confirm}].map((s,i)=>(
          <React.Fragment key={s.n}>
            <div style={{display:'flex',alignItems:'center',gap:4,flex:1}}>
              <div style={{width:22,height:22,borderRadius:11,background:step>=s.n?C.navy:'#e2e8f0',color:step>=s.n?'#fff':C.muted,fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {step>s.n?'✓':s.n}
              </div>
              <span style={{fontSize:11,fontWeight:700,color:step>=s.n?C.navy:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.l}</span>
            </div>
            {i<2&&<div style={{width:16,height:2,background:step>s.n?C.navy:C.border,borderRadius:1,flexShrink:0}}/>}
          </React.Fragment>
        ))}
      </div>

      {step===1&&(
        <div style={{flex:1,overflow:'auto',padding:'12px 14px'}}>
          <div style={{fontWeight:800,fontSize:15,color:C.text,marginBottom:10}}>{t.selectCustomer}</div>
          {data.customers.length===0&&<div style={{color:C.muted,textAlign:'center',padding:'30px 0',fontSize:14}}>{t.noCustomers}</div>}
          {data.customers.map(c=>(
            <Card key={c.id} onClick={()=>{setCustomer(c);setStep(2);}} style={{border:`2px solid ${customer?.id===c.id?C.navy:'transparent'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:800,fontSize:15}}>{c.name}</div>
                  <div style={{color:C.muted,fontSize:12}}>{c.phone}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:900,fontSize:16,color:c.balance>0?C.amber:C.success}}>{fmt(c.balance)}</div>
                  <div style={{color:C.muted,fontSize:11}}>{t.outstanding}</div>
                </div>
              </div>
            </Card>
          ))}
          <div style={{height:20}}/>
        </div>
      )}

      {step===2&&(
        <div style={{flex:1,overflow:'auto'}}>
          <div style={{background:C.navy,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
            <div>
              <div style={{color:'rgba(255,255,255,0.55)',fontSize:11,fontWeight:600}}>Customer</div>
              <div style={{color:'#fff',fontWeight:800,fontSize:15}}>{customer?.name}</div>
            </div>
            <button onClick={()=>setStep(1)} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'#fff',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>‹ Change</button>
          </div>

          <div style={{margin:'10px 14px 0',background:C.white,borderRadius:14,overflow:'hidden',border:`1px solid ${C.border}`}}>
            <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:800,fontSize:13}}>🛒 {t.basket} ({basket.length} {t.items})</span>
              {basket.length>0&&(
                <button onClick={()=>setBasket(b=>b.slice(0,-1))}
                  style={{background:'none',border:'none',color:C.amber,fontSize:12,fontWeight:700,cursor:'pointer'}}>
                  ↩ {t.undo}
                </button>
              )}
            </div>
            {basket.length===0?(
              <div style={{padding:'16px',textAlign:'center',color:C.muted,fontSize:13,lineHeight:1.5}}>{t.emptyBasket}</div>
            ):(
              basket.map(item=>(
                <div key={item.productId} style={{padding:'10px 12px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.name}</div>
                    <div style={{color:C.muted,fontSize:11}}>{fmt(item.price)} {t.perItem}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <button onClick={()=>changeQty(item.productId,-1)} style={{width:26,height:26,borderRadius:13,background:C.bg,border:`1px solid ${C.border}`,cursor:'pointer',fontSize:16,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',color:C.navy}}>−</button>
                    <span style={{fontWeight:800,fontSize:14,minWidth:18,textAlign:'center'}}>{item.qty}</span>
                    <button onClick={()=>changeQty(item.productId,1)} style={{width:26,height:26,borderRadius:13,background:C.navy,border:'none',cursor:'pointer',fontSize:16,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>+</button>
                  </div>
                  <div style={{textAlign:'right',minWidth:60}}>
                    <div style={{fontWeight:800,fontSize:13,color:C.navy}}>{fmt(item.total)}</div>
                    <button onClick={()=>removeItem(item.productId)} style={{background:'none',border:'none',color:C.danger,fontSize:11,fontWeight:700,cursor:'pointer',padding:0}}>
                      🗑️ {t.removeFromBasket}
                    </button>
                  </div>
                </div>
              ))
            )}
            {basket.length>0&&(
              <div style={{padding:'10px 14px',background:C.goldLight,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:800,color:C.navyDark}}>{t.total}</span>
                <span style={{fontWeight:900,fontSize:18,color:C.navy}}>{fmt(basketTotal)}</span>
              </div>
            )}
          </div>

          {notFound&&(
            <div style={{margin:'8px 14px',background:C.dangerLight,border:`1px solid ${C.danger}`,borderRadius:10,padding:'10px 12px',fontSize:13,color:C.danger,fontWeight:600}}>
              ⚠️ Barcode "{notFound}" not in stock.{' '}
              <button onClick={()=>setNotFound('')} style={{background:'none',border:'none',color:C.danger,fontWeight:700,cursor:'pointer',textDecoration:'underline'}}>Dismiss</button>
            </div>
          )}

          <div style={{padding:'10px 14px 0'}}>
            <Btn onClick={()=>setScanning(true)} variant='gold' style={{width:'100%',marginBottom:10}}>📷 {t.scanBarcode}</Btn>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={`🔍 ${t.search}`}
              style={{width:'100%',background:C.white,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'10px 14px',fontSize:14,outline:'none',marginBottom:8}}/>
            <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:6}}>{lang==='af'?'Tik produk om by te voeg':'Tap product to add to basket'}</div>
            {filteredProds.map(p=>{
              const outOfStock=typeof p.stock_qty==='number'&&p.stock_qty===0;
              const lowStock=typeof p.stock_qty==='number'&&p.stock_qty>0&&p.stock_qty<=3;
              return(
              <div key={p.id} onClick={()=>addToBasket(p)}
                style={{background:C.white,borderRadius:12,padding:'10px 14px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center',
                  border:`1.5px solid ${outOfStock?C.danger:lowStock?C.amber:C.border}`,cursor:'pointer',opacity:outOfStock?.65:1}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13}}>{lang==='af'&&p.nameAf?p.nameAf:p.name}</div>
                  <div style={{color:C.muted,fontSize:11}}>{p.barcode}</div>
                  {typeof p.stock_qty==='number'&&(
                    <div style={{fontSize:10,fontWeight:700,marginTop:1,color:outOfStock?C.danger:lowStock?C.amber:C.success}}>
                      {outOfStock?`⚠️ ${t.outOfStock}`:lowStock?`⚠️ ${p.stock_qty} left`:`📦 ${p.stock_qty} left`}
                    </div>
                  )}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontWeight:800,fontSize:14,color:C.navy}}>{fmt(p.sellPrice)}</span>
                  <div style={{width:28,height:28,borderRadius:14,background:outOfStock?C.muted:C.navy,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:18,fontWeight:900}}>+</div>
                </div>
              </div>
              );
            })}
          </div>

          {basket.length>0&&(
            <div style={{padding:'12px 14px 0'}}>
              <Btn onClick={()=>setStep(3)} variant='primary' style={{width:'100%'}}>
                Review & Confirm → ({basket.length} items, {fmt(basketTotal)})
              </Btn>
            </div>
          )}
          <div style={{height:20}}/>
        </div>
      )}

      {step===3&&(
        <div style={{flex:1,overflow:'auto',padding:'14px'}}>
          <Card style={{marginBottom:12}}>
            <div style={{marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>Customer</div>
              <div style={{fontSize:18,fontWeight:900,color:C.navy,marginTop:2}}>{customer?.name}</div>
            </div>
            {basket.map(item=>(
              <div key={item.productId} style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
                <div><span style={{fontWeight:600,fontSize:14}}>{item.name}</span><span style={{color:C.muted,fontSize:13}}> ×{item.qty}</span></div>
                <span style={{fontWeight:700,fontSize:14}}>{fmt(item.total)}</span>
              </div>
            ))}
            <div style={{borderTop:`2px solid ${C.navy}`,paddingTop:10,marginTop:6,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:800,fontSize:15}}>{t.total}</span>
              <span style={{fontWeight:900,fontSize:24,color:C.navy}}>{fmt(basketTotal)}</span>
            </div>
          </Card>
          <div style={{background:C.goldLight,border:`1px solid ${C.gold}`,borderRadius:12,padding:'12px 16px',marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:C.navyDark,marginBottom:2}}>{t.newBalance}</div>
            <div style={{fontSize:22,fontWeight:900,color:C.navy}}>{fmt((customer?.balance||0)+basketTotal)}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{t.deductNote}</div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <Btn onClick={()=>setStep(2)} variant='outline' style={{flex:1}}>‹ {t.back}</Btn>
            <Btn onClick={confirmSale} variant='primary' style={{flex:2}}>✓ {t.confirmSale}</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// CUSTOMERS
// ─────────────────────────────────────────────────────────────
function CustomersScreen({data,setData,t,lang}){
  const [selected,setSelected]=React.useState(null);
  const [addModal,setAddModal]=React.useState(false);
  const [editModal,setEditModal]=React.useState(null);
  const [form,setForm]=React.useState({name:'',phone:''});
  const [toast,setToast]=React.useState('');
  const [settleConfirm,setSettleConfirm]=React.useState(false);
  const [delTxConfirm,setDelTxConfirm]=React.useState(null);
  const [delCustConfirm,setDelCustConfirm]=React.useState(false);

  function saveCustomer(){
    if(!form.name.trim())return;
    if(editModal){
      const nd={...data,customers:data.customers.map(c=>c.id===editModal.id?{...c,name:form.name.trim(),phone:form.phone.trim()}:c)};
      setData(nd);saveData(nd);setEditModal(null);
    } else {
      const c={id:uid(),name:form.name.trim(),phone:form.phone.trim(),balance:0};
      const nd={...data,customers:[...data.customers,c]};
      setData(nd);saveData(nd);setAddModal(false);
    }
    setForm({name:'',phone:''});
  }

  function openEdit(c){setForm({name:c.name,phone:c.phone});setEditModal(c);}

  function settleAll(id){
    const nd={...data,
      transactions:data.transactions.map(tx=>tx.customerId===id?{...tx,status:'settled'}:tx),
      customers:data.customers.map(c=>c.id===id?{...c,balance:0}:c)
    };
    setData(nd);saveData(nd);setSettleConfirm(false);setToast(t.settled+'!');
  }

  function deleteTx(txId,amount,custId){
    const nd={...data,
      transactions:data.transactions.filter(tx=>tx.id!==txId),
      customers:data.customers.map(c=>c.id===custId?{...c,balance:Math.max(0,parseFloat((c.balance-amount).toFixed(2)))}:c)
    };
    setData(nd);saveData(nd);setDelTxConfirm(null);
  }

  function deleteCustomer(id){
    const nd={...data,customers:data.customers.filter(c=>c.id!==id),transactions:data.transactions.filter(tx=>tx.customerId!==id)};
    setData(nd);saveData(nd);setDelCustConfirm(false);setSelected(null);
  }

  if(selected){
    const cust=data.customers.find(c=>c.id===selected.id)||selected;
    const txs=data.transactions.filter(tx=>tx.customerId===cust.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const openBalance=txs.filter(tx=>tx.status==='open').reduce((s,tx)=>s+tx.total,0);
    return(
      <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg,position:'relative'}}>
        {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
        {settleConfirm&&<ConfirmDialog title={t.settle} message={`${t.settleConfirm} (${fmt(openBalance)})`} onConfirm={()=>settleAll(cust.id)} onCancel={()=>setSettleConfirm(false)} confirmLabel={t.yesSettle} danger={false}/>}
        {delTxConfirm&&<ConfirmDialog title={t.deleteTransaction} message={`${fmtDate(delTxConfirm.date)} — ${fmt(delTxConfirm.total)}`} onConfirm={()=>deleteTx(delTxConfirm.id,delTxConfirm.total,cust.id)} onCancel={()=>setDelTxConfirm(null)} confirmLabel={t.deleteTransaction}/>}
        {delCustConfirm&&<ConfirmDialog title={t.deleteCustomer} message={t.deleteCustomerConfirm} onConfirm={()=>deleteCustomer(cust.id)} onCancel={()=>setDelCustConfirm(false)} confirmLabel={t.deleteCustomer}/>}

        <div style={{background:C.navy,padding:'10px 14px 16px',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <button onClick={()=>setSelected(null)} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'#fff',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>‹ {t.back}</button>
            <button onClick={()=>openEdit(cust)} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'#fff',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>✏️ {t.edit}</button>
          </div>
          <div style={{color:'rgba(255,255,255,0.6)',fontSize:12}}>{cust.phone||'No phone'}</div>
          <div style={{color:'#fff',fontSize:22,fontWeight:900}}>{cust.name}</div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginTop:10}}>
            <div>
              <div style={{color:'rgba(255,255,255,0.6)',fontSize:11,fontWeight:600,textTransform:'uppercase'}}>{t.outstanding}</div>
              <div style={{color:openBalance>0?C.gold:'#4ADE80',fontSize:30,fontWeight:900}}>{fmt(openBalance)}</div>
            </div>
            {openBalance>0&&<Btn onClick={()=>setSettleConfirm(true)} variant='gold' small>✓ {t.settle}</Btn>}
          </div>
        </div>

        <div style={{flex:1,overflow:'auto',padding:'12px 14px'}}>
          <div style={{fontSize:12,fontWeight:800,color:C.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>{t.creditLog} ({txs.length})</div>
          {txs.length===0&&<div style={{color:C.muted,textAlign:'center',padding:'30px 0',fontSize:14}}>{t.noTransactions}</div>}
          {txs.map(tx=>(
            <Card key={tx.id}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:C.text}}>{fmtDate(tx.date)}</div>
                  <Badge label={tx.status==='open'?t.outstanding:t.settled} color={tx.status==='open'?C.amber:C.success}/>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <div style={{fontWeight:900,fontSize:17,color:C.navy}}>{fmt(tx.total)}</div>
                  <button onClick={()=>setDelTxConfirm(tx)}
                    style={{background:C.dangerLight,border:`1px solid ${C.danger}`,color:C.danger,borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',fontWeight:700}}>
                    🗑️
                  </button>
                </div>
              </div>
              <div style={{background:C.bg,borderRadius:8,padding:'8px 10px'}}>
                {tx.items.map((it,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.muted,marginBottom:i<tx.items.length-1?4:0}}>
                    <span>{it.name} ×{it.qty}</span><span style={{fontWeight:600}}>{fmt(it.total)}</span>
                  </div>
                ))}
              </div>
            </Card>
          ))}
        </div>

        <div style={{padding:'10px 14px 12px',borderTop:`1px solid ${C.border}`,background:C.white,flexShrink:0}}>
          <Btn onClick={()=>setDelCustConfirm(true)} variant='dangerOutline' style={{width:'100%'}}>🗑️ {t.deleteCustomer}: {cust.name}</Btn>
        </div>

        {editModal&&(
          <Modal title={`${t.edit}: ${editModal.name}`} onClose={()=>setEditModal(null)}>
            <div style={{paddingTop:16}}>
              <Input label={t.customerName} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
              <Input label={t.phone} value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} type="tel"/>
              <Btn onClick={saveCustomer} variant='primary' style={{width:'100%'}}>{t.save}</Btn>
              <div style={{height:10}}/>
            </div>
          </Modal>
        )}
      </div>
    );
  }

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg,position:'relative'}}>
      {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
      <div style={{padding:'10px 14px 8px',flexShrink:0}}>
        <Btn onClick={()=>{setForm({name:'',phone:''});setAddModal(true);}} variant='primary' style={{width:'100%'}}>+ {t.addCustomer}</Btn>
        <div style={{marginTop:6,color:C.muted,fontSize:12,fontWeight:600}}>{lang==='af'?'Tik kliënt om detail te sien':'Tap a customer to see their credit log'}</div>
      </div>
      <div style={{flex:1,overflow:'auto',padding:'0 14px'}}>
        {data.customers.length===0&&<div style={{color:C.muted,textAlign:'center',padding:'40px 0',fontSize:14}}>{t.noCustomers}</div>}
        {data.customers.map(c=>(
          <Card key={c.id} onClick={()=>setSelected(c)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:C.text}}>{c.name}</div>
                <div style={{color:C.muted,fontSize:12,marginTop:1}}>{c.phone}</div>
                <div style={{marginTop:4}}>
                  <Badge label={c.balance>0?`${t.outstanding}: ${fmt(c.balance)}`:`✓ ${t.allClear}`} color={c.balance>0?C.amber:C.success}/>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:900,fontSize:22,color:c.balance>0?C.navy:C.success}}>{fmt(c.balance)}</div>
                <div style={{color:C.muted,fontSize:11}}>
                  {data.transactions.filter(tx=>tx.customerId===c.id&&tx.status==='open').length} {lang==='af'?'oop':'open'}
                </div>
              </div>
            </div>
          </Card>
        ))}
        <div style={{height:20}}/>
      </div>
      {addModal&&(
        <Modal title={t.addCustomer} onClose={()=>setAddModal(false)}>
          <div style={{paddingTop:16}}>
            <Input label={t.customerName} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. John Sithole"/>
            <Input label={t.phone} value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="e.g. 082 123 4567" type="tel"/>
            <Btn onClick={saveCustomer} variant='primary' style={{width:'100%'}}>{t.save}</Btn>
            <div style={{height:10}}/>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// REPORTS
// ─────────────────────────────────────────────────────────────
function ReportsScreen({data,t,lang}){
  const curYear=new Date().getFullYear();
  const[monthIdx,setMonthIdx]=React.useState(new Date().getMonth());
  const[year,setYear]=React.useState(curYear);
  const[showAll,setShowAll]=React.useState(false);
  const years=[curYear-1,curYear,curYear+1];

  const filtered=data.transactions.filter(tx=>{
    if(showAll)return true;
    const d=new Date(tx.date);return d.getMonth()===monthIdx&&d.getFullYear()===year;
  });

  // Build product map for cost price lookup
  const productMap={};
  data.products.forEach(p=>{productMap[p.id]=p;});

  // Calculate profit & best sellers from filtered transactions
  let totalProfit=0;
  const productSales={};
  filtered.forEach(tx=>{
    tx.items.forEach(item=>{
      const prod=productMap[item.productId];
      const cost=prod?.costPrice||0;
      const itemProfit=(item.price-cost)*item.qty;
      totalProfit+=itemProfit;
      if(!productSales[item.productId])
        productSales[item.productId]={name:item.name,qty:0,revenue:0,profit:0};
      productSales[item.productId].qty+=item.qty;
      productSales[item.productId].revenue+=item.total;
      productSales[item.productId].profit+=itemProfit;
    });
  });
  const bestSellers=Object.values(productSales).sort((a,b)=>b.qty-a.qty).slice(0,5);
  const maxQty=bestSellers.length?bestSellers[0].qty:1;

  const byCust=data.customers.map(c=>{
    const txs=filtered.filter(tx=>tx.customerId===c.id);
    return{...c,txs,total:txs.reduce((s,tx)=>s+tx.total,0),items:txs.reduce((s,tx)=>s+tx.items.reduce((ss,i)=>ss+i.qty,0),0)};
  }).filter(c=>c.txs.length>0).sort((a,b)=>b.total-a.total);
  const grand=byCust.reduce((s,c)=>s+c.total,0);
  const margin=grand>0?Math.round((totalProfit/grand)*100):0;

  const periodLabel=showAll?t.allMonths:MONTHS[monthIdx]+' '+year;

  return(
    <div style={{height:'100%',overflow:'auto',background:C.bg}}>
      {/* Period filter */}
      <div style={{padding:'8px 14px',background:C.white,borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:'flex',gap:8}}>
          <select value={showAll?'all':monthIdx} onChange={e=>{if(e.target.value==='all'){setShowAll(true);}else{setShowAll(false);setMonthIdx(Number(e.target.value));}}}
            style={{flex:1,background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'10px',fontSize:13,color:C.text,outline:'none'}}>
            <option value="all">{t.allMonths}</option>
            {MONTHS.map((m,i)=><option key={i} value={i}>{m.slice(0,3)}</option>)}
          </select>
          <select value={year} onChange={e=>setYear(Number(e.target.value))}
            style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'10px',fontSize:13,color:C.text,outline:'none'}}>
            {years.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
      </div>

      <div style={{padding:'12px 14px 0'}}>

        {/* Revenue + Profit cards */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <div style={{background:`linear-gradient(135deg,${C.navyDark},${C.navy})`,borderRadius:14,padding:'14px 16px'}}>
            <div style={{color:'rgba(255,255,255,0.55)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:.5}}>Revenue</div>
            <div style={{color:'#fff',fontSize:22,fontWeight:900,marginTop:4,lineHeight:1}}>{fmt(grand)}</div>
            <div style={{color:C.gold,fontSize:11,fontWeight:700,marginTop:6}}>{byCust.length} customers</div>
            <div style={{color:'rgba(255,255,255,0.45)',fontSize:10,marginTop:1}}>{filtered.length} sales</div>
          </div>
          <div style={{background:'linear-gradient(135deg,#14532d,#16a34a)',borderRadius:14,padding:'14px 16px'}}>
            <div style={{color:'rgba(255,255,255,0.55)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:.5}}>Profit</div>
            <div style={{color:'#fff',fontSize:22,fontWeight:900,marginTop:4,lineHeight:1}}>{fmt(totalProfit)}</div>
            <div style={{color:'rgba(255,255,255,0.8)',fontSize:11,fontWeight:700,marginTop:6}}>{margin}% margin</div>
            <div style={{color:'rgba(255,255,255,0.45)',fontSize:10,marginTop:1}}>{periodLabel}</div>
          </div>
        </div>

        {/* Best Sellers */}
        {bestSellers.length>0&&(
          <div style={{background:C.white,borderRadius:14,padding:'14px 16px',marginBottom:12,border:`1px solid ${C.border}`}}>
            <div style={{fontWeight:800,fontSize:14,color:C.navy,marginBottom:12}}>🔥 Best Sellers</div>
            {bestSellers.map((p,i)=>(
              <div key={p.name} style={{marginBottom:i<bestSellers.length-1?12:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,flex:1,minWidth:0}}>
                    <span style={{fontSize:14,flexShrink:0}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '}</span>
                    <span style={{fontSize:13,fontWeight:700,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
                  </div>
                  <span style={{fontSize:12,fontWeight:700,color:C.muted,flexShrink:0,marginLeft:8}}>{p.qty} sold</span>
                </div>
                <div style={{background:C.bg,borderRadius:4,height:7,marginBottom:3}}>
                  <div style={{background:i===0?C.gold:'#93c5fd',borderRadius:4,height:7,width:`${Math.round((p.qty/maxQty)*100)}%`,transition:'width .4s ease'}}/>
                </div>
                <div style={{fontSize:11,color:C.muted}}>{fmt(p.revenue)} revenue · <span style={{color:'#16a34a',fontWeight:700}}>{fmt(p.profit)} profit</span></div>
              </div>
            ))}
          </div>
        )}

        {/* Customer breakdown */}
        {filtered.length===0&&(
          <div style={{color:C.muted,textAlign:'center',padding:'30px 0',fontSize:14}}>{t.noTransactions}</div>
        )}
        {byCust.length>0&&(
          <div style={{fontWeight:800,fontSize:13,color:C.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>By Customer</div>
        )}
        {byCust.map(c=>(
          <Card key={c.id}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div>
                <div style={{fontWeight:800,fontSize:15}}>{c.name}</div>
                <div style={{color:C.muted,fontSize:12}}>{c.txs.length} transactions · {c.items} items</div>
              </div>
              <div style={{fontWeight:900,fontSize:19,color:C.navy}}>{fmt(c.total)}</div>
            </div>
            {c.txs.map(tx=>(
              <div key={tx.id} style={{background:C.bg,borderRadius:8,padding:'8px 10px',marginBottom:6}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:12,color:C.muted,fontWeight:600}}>{fmtDate(tx.date)}</span>
                  <span style={{fontSize:13,fontWeight:800,color:tx.status==='open'?C.navy:C.success}}>{fmt(tx.total)}</span>
                </div>
                {tx.items.map((it,i)=>(
                  <div key={i} style={{fontSize:11,color:C.muted,display:'flex',justifyContent:'space-between'}}>
                    <span>{it.name} ×{it.qty}</span><span>{fmt(it.total)}</span>
                  </div>
                ))}
              </div>
            ))}
          </Card>
        ))}
        <div style={{height:30}}/>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// CLOUD SYNC SETTINGS SECTION
// ─────────────────────────────────────────────────────────────
function CloudSyncSection({data}){
  const cfg=getSBConfig();
  const[url,setUrl]=React.useState(cfg.url);
  const[key,setKey]=React.useState(cfg.key);
  const[shopId,setShopId]=React.useState(cfg.shopId);
  const[status,setStatus]=React.useState('idle');
  const[show,setShow]=React.useState(!cfg.url);
  const isConfigured=!!(cfg.url&&cfg.key&&cfg.shopId);

  async function saveAndTest(){
    setStatus('saving');
    localStorage.setItem('koekela_sb_url',url.trim());
    localStorage.setItem('koekela_sb_key',key.trim());
    localStorage.setItem('koekela_shop_id',shopId.trim());
    try{await saveToCloud(data);setStatus('ok');setTimeout(()=>setShow(false),1500);}
    catch(e){setStatus('fail');}
  }
  function disconnect(){
    ['koekela_sb_url','koekela_sb_key','koekela_shop_id'].forEach(k=>localStorage.removeItem(k));
    setUrl('');setKey('');setShopId('');setStatus('idle');setShow(true);
  }

  return(
    <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>☁️ Cloud Sync</div>
        <span style={{fontSize:12,fontWeight:700,color:isConfigured?C.success:'#999'}}>{isConfigured?'● Connected':'○ Off'}</span>
      </div>
      {isConfigured&&!show&&(
        <div style={{background:C.bg,borderRadius:10,padding:'10px 14px',marginBottom:8,fontSize:12,color:C.muted}}>
          Shop: <strong style={{color:C.text}}>{cfg.shopId}</strong> · Syncing automatically
        </div>
      )}
      <Btn onClick={()=>setShow(s=>!s)} variant='outline' style={{width:'100%',marginBottom:show?10:0}}>
        {show?'▲ Hide':(isConfigured?'✏️ Edit Sync Settings':'⚙️ Set Up Cloud Sync')}
      </Btn>
      {show&&(
        <div>
          <div style={{fontSize:11,lineHeight:1.6,background:'#EFF6FF',borderRadius:8,padding:'10px',border:'1px solid #BFDBFE',marginBottom:10,color:'#1D4ED8'}}>
            💡 Go to <strong>supabase.com</strong> → your project → <strong>Settings → API</strong><br/>Copy <em>Project URL</em> and <em>anon public</em> key. Choose any Shop ID — all devices must use the same one.
          </div>
          {[
            {label:'Project URL',val:url,set:setUrl,ph:'https://xxxx.supabase.co'},
            {label:'Anon Key',val:key,set:setKey,ph:'eyJhbGciOi...'},
            {label:'Shop ID',val:shopId,set:setShopId,ph:'my-spaza-2024'},
          ].map(({label,val,set,ph})=>(
            <div key={label} style={{marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:3}}>{label}</div>
              <input value={val} onChange={e=>set(e.target.value)} placeholder={ph}
                style={{width:'100%',border:`1.5px solid ${C.border}`,borderRadius:8,padding:'9px 12px',fontSize:12,outline:'none',background:C.white,color:C.text}}/>
            </div>
          ))}
          <Btn onClick={saveAndTest} variant='primary' style={{width:'100%',marginTop:4}}>
            {status==='saving'?'Connecting...'
             :status==='ok'?'✅ Connected!'
             :status==='fail'?'❌ Failed — check details'
             :'💾 Save & Connect'}
          </Btn>
          {isConfigured&&(
            <Btn onClick={disconnect} variant='dangerOutline' style={{width:'100%',marginTop:8}}>
              Disconnect Cloud Sync
            </Btn>
          )}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SETTINGS MODAL
// ─────────────────────────────────────────────────────────────
function SettingsModal({data,setData,t,lang,onClose,onBackup,onChangePIN}){
  const hasPin=!!localStorage.getItem('koekela_pin');
  const lastBackup=localStorage.getItem('koekela_last_backup');
  const lastStr=lastBackup?new Date(parseInt(lastBackup)).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'}):'Never';

  function exportData(){
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`koekela-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();URL.revokeObjectURL(url);
    markBackup();
    if(onBackup)onBackup();
  }

  function importData(e){
    const file=e.target.files[0];if(!file)return;
    if(file.size>10*1024*1024){alert('❌ File too large');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d?.products||!d?.customers||!d?.transactions)throw new Error('Invalid structure');
        setData(d);saveData(d);alert('✓ Data restored!');onClose();
      }catch(err){alert('❌ Invalid backup file — could not restore');}
    };
    reader.onerror=()=>alert('❌ Could not read file');
    reader.readAsText(file);
  }

  return(
    <Modal title={`⚙️ ${t.settings}`} onClose={onClose}>
      <div style={{paddingTop:16}}>
        {/* Backup status */}
        <div style={{background:C.bg,borderRadius:10,padding:'12px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>Last Backup</div>
            <div style={{fontSize:15,fontWeight:800,color:C.text,marginTop:2}}>{lastStr}</div>
          </div>
          <span style={{fontSize:24}}>{lastBackup?'✅':'⚠️'}</span>
        </div>

        <div style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.6,background:'#FFF8E7',borderRadius:10,padding:'12px',border:`1px solid ${C.gold}`}}>
          💡 Data is saved in <strong>this browser</strong>. Use <strong>Download Backup</strong> regularly — keep the file somewhere safe.
        </div>

        <Btn onClick={exportData} variant='primary' style={{width:'100%',marginBottom:10}}>
          📥 {t.backupData}
        </Btn>

        <label style={{display:'block',marginBottom:16}}>
          <div style={{background:C.bg,border:`2px solid ${C.border}`,borderRadius:12,padding:'13px 20px',fontSize:15,fontWeight:700,color:C.text,cursor:'pointer',textAlign:'center'}}>
            📤 {t.restoreData}
          </div>
          <input type="file" accept=".json" onChange={importData} style={{display:'none'}}/>
        </label>

        {/* Security */}
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:10}}>🔒 Security</div>
          <Btn onClick={onChangePIN} variant='outline' style={{width:'100%',marginBottom:8}}>
            {hasPin?'🔑 Change PIN':'🔒 Set PIN Lock'}
          </Btn>
          {hasPin&&(
            <Btn onClick={()=>{localStorage.removeItem('koekela_pin');alert('PIN removed.');}} variant='dangerOutline' style={{width:'100%'}}>
              Remove PIN
            </Btn>
          )}
          <div style={{fontSize:11,color:C.muted,marginTop:8,lineHeight:1.5}}>
            PIN protects the app from casual access. Data in the browser is encrypted by your device's OS.
          </div>
        </div>

        <CloudSyncSection data={data}/>

        {/* Data summary */}
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Data Summary</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[
              {l:lang==='af'?'Produkte':'Products',v:data.products.length},
              {l:lang==='af'?'Kliente':'Customers',v:data.customers.length},
              {l:lang==='af'?'Transaksies':'Transactions',v:data.transactions.length},
              {l:lang==='af'?'Uitstaande':'Outstanding',v:fmt(data.customers.reduce((s,c)=>s+c.balance,0))},
            ].map(({l,v})=>(
              <div key={l} style={{background:C.bg,borderRadius:10,padding:'10px 12px'}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:600}}>{l}</div>
                <div style={{fontSize:16,fontWeight:800,color:C.navy}}>{v}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{height:10}}/>
      </div>
    </Modal>
  );
}

// ─────────────────────────────────────────────────────────────
// APP CONTENT
// ─────────────────────────────────────────────────────────────
function AppContent(){
  const [data,setData]=React.useState(()=>loadData());
  const [tab,setTab]=React.useState('home');
  const [lang,setLang]=React.useState(()=>loadData().lang||'en');
  const [showSettings,setShowSettings]=React.useState(false);
  const [lastBackup,setLastBackup]=React.useState(()=>localStorage.getItem('koekela_last_backup'));

  const hasPin=!!localStorage.getItem('koekela_pin');
  const [unlocked,setUnlocked]=React.useState(!hasPin);

  // IDB fallback on first load if localStorage was empty
  React.useEffect(()=>{
    if(!localStorage.getItem('koekela_data')){
      IDB.get('koekela_data').then(d=>{
        if(d&&d.products&&d.customers){setData(d);saveData(d);}
      });
    }
  },[]);

  // Live sync from dashboard
  React.useEffect(()=>{
    let ch;
    try{
      ch=new BroadcastChannel('koekela_sync');
      ch.onmessage=e=>{if(e.data?.type==='update'&&e.data?.data)setData(e.data.data);};
    }catch(e){}
    return()=>{try{if(ch)ch.close();}catch(e){}};
  },[]);

  // Cloud sync — load on mount, subscribe to real-time changes
  React.useEffect(()=>{
    const{shopId}=getSBConfig();
    if(!shopId)return;
    function syncNow(){
      loadFromCloud().then(d=>{
        if(d?.products&&d?.customers){setData(d);_persist(d);}
      });
    }
    syncNow(); // pull on mount
    // Pull again every time the user switches back to this tab/app
    function onVisible(){if(document.visibilityState==='visible')syncNow();}
    document.addEventListener('visibilitychange',onVisible);
    const ch=subscribeToCloud(d=>{
      if(d?.products&&d?.customers){setData(d);_persist(d);}
    });
    return()=>{
      document.removeEventListener('visibilitychange',onVisible);
      try{if(ch)ch.unsubscribe();}catch(e){}
    };
  },[]);

  // Persist language change
  React.useEffect(()=>{
    const nd={...data,lang};saveData(nd);
  },[lang]);

  function handleBackup(){
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`koekela-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();URL.revokeObjectURL(url);
    markBackup();
    setLastBackup(Date.now().toString());
  }

  function handleChangePIN(){
    localStorage.removeItem('koekela_pin');
    setShowSettings(false);
    setUnlocked(false);
  }

  if(!unlocked){
    return <PINScreen onUnlock={()=>setUnlocked(true)} hasPin={hasPin}/>;
  }

  const t=T[lang];
  const titles={home:lang==='af'?'Tuis':'Home',inventory:t.inventory,sale:t.newSale,customers:t.customers,reports:t.report};

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',fontFamily:'Nunito,sans-serif',position:'relative',overflow:'hidden'}}>
      <AppHeader title={titles[tab]} lang={lang} setLang={setLang}
        rightSlot={tab==='home'&&(
          <button onClick={()=>setShowSettings(true)}
            style={{background:'rgba(255,255,255,0.15)',border:'none',cursor:'pointer',color:'#fff',borderRadius:10,padding:'7px 11px',fontSize:16}}>⚙️</button>
        )}/>
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {tab==='home'&&<HomeScreen data={data} setData={setData} setTab={setTab} t={t} lang={lang} onOpenSettings={()=>setShowSettings(true)} onBackup={handleBackup} lastBackup={lastBackup}/>}
        {tab==='inventory'&&<InventoryScreen data={data} setData={setData} t={t} lang={lang}/>}
        {tab==='sale'&&<SaleScreen data={data} setData={setData} t={t} lang={lang} setTab={setTab}/>}
        {tab==='customers'&&<CustomersScreen data={data} setData={setData} t={t} lang={lang}/>}
        {tab==='reports'&&<ReportsScreen data={data} t={t} lang={lang}/>}
        {showSettings&&<SettingsModal data={data} setData={setData} t={t} lang={lang} onClose={()=>setShowSettings(false)} onBackup={()=>setLastBackup(Date.now().toString())} onChangePIN={handleChangePIN}/>}
      </div>
      <TabBar tab={tab} setTab={setTab} t={t}/>
    </div>
  );
}

  const isStandalone=window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone===true;

  if(isStandalone||isMobile){
    return(
      <div className="mobile-app-root" style={{background:'#F2F2F7',fontFamily:'Nunito,sans-serif'}}>

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16,padding:'20px 0 30px'}}>
      <div style={{color:'rgba(255,255,255,0.4)',fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:1}}>
        Koekela Spaza Shop · Phone App
      </div>
      <IOSDevice width={402} height={874}>
        <AppContent/>
      </IOSDevice>
      <a href="Koekela Dashboard.html" target="_blank" rel="noopener noreferrer"
        style={{color:'rgba(255,255,255,0.6)',fontSize:13,fontWeight:600,textDecoration:'none',
          background:'rgba(255,255,255,0.08)',borderRadius:10,padding:'8px 22px',border:'1px solid rgba(255,255,255,0.15)'}}>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
